 SRMs and warheads for both Israel and U.S. national security demand.' Feeds Golden Dome interceptor supply chain directly.</li></ul>","<p>與Rafael（Iron Dome/David's Sling/Iron Beam製造商）合資。</p><ul><li>量產固體火箭發動機和戰鬥部。</li><li>CEO：「數萬枚為以色列和美國國安需求。</li><li>」直接供應Golden Dome攔截器供應鏈。</li></ul>"]},{name:"Oriole SRM + Microwave Electronics",value:"60 units ordered + multi-program ongoing",agency:["Multiple (MDA, USSF, intl)","多個（MDA、太空軍、國際）"],type:["FFP production orders","FFP生產訂單"],pop:["Ongoing","進行中"],desc:["<p>Oriole: up to 60 SRMs for 'ballistic missile defense-related' missions.</p><ul><li>Microwave electronics embedded in Iron Dome, Iron Sting, Arrow, Patriot, THAAD, IBCS, IFPC — virtually every ground system Golden Dome integrates.</li><li>Expanding Israel manufacturing including space-qualified facility.</li></ul>","<p>Oriole：最多60枚SRM用於「彈道導彈防禦」任務。</p><ul><li>微波電子元件嵌入Iron Dome、Arrow、愛國者、THAAD、IBCS、IFPC——幾乎所有Golden Dome整合的地面系統。</li></ul>"]},{name:"Resilient MWT Ground Management & Integration (GMI)",value:"Up to <b>$446.8M</b> (OTA, all options)",agency:["U.S. Space Force — Space Systems Command (SSC)","美國太空軍——太空系統司令部（SSC）"],type:["Other Transaction Agreement (OTA) — Prime Contractor / System Integrator","OTA——主承商/系統整合商"],pop:["Apr 2026 – ongoing (multi-year)","2026年4月–進行中（多年期）"],desc:["<p>Announced <b>April 8, 2026</b>. Kratos awarded up to <b>$446.8M</b> as PRIME contractor for the U.S. Space Force Space Systems Command's Ground Management & Integration (GMI) program — the ground architecture for the Resilient Missile Warning & Tracking (MWT) constellation in Medium Earth Orbit (MEO).</p><ul><li><b>Materiality:</b> Contract equals ~33% of Kratos's FY2025 revenue ($1.35B). Stock up ~7% on announcement.</li><li><b>Golden Dome Relevance:</b> MWT MEO tracks hypersonic glide vehicles and maneuvering ballistic missiles — a cornerstone sensor layer for Golden Dome's detection chain. Kratos operates the GROUND system that receives data from Boeing's 12 Resilient MWT sats + BAE's Epoch 2 sats + future additions.</li><li><b>Structural Reversal:</b> Kratos leads a team including <b>Northrop Grumman</b> (as subcontractor!), Auria, ASRC Federal, and Rise8 — mirroring the C2 consortium pattern where traditional primes now work as subs to specialized integrators.</li><li><b>OpenSpace Platform:</b> Leverages Kratos's software-defined ground system, integrated with DoW's Future Operationally Resilient Ground Evolution (FORGE) platform for multi-vendor interoperability.</li><li><b>Phil Carrai (President, Kratos Space/Training/Cyber):</b> 'Our long-standing investments in advanced space and communications technologies are enabling us to take on programs of increasing scale and importance.'</li><li><b>Greg Caicedo (SVP Kratos Space):</b> 'A globally distributed ground architecture is essential for integrating multiple satellites, providers and mission systems.'</li><li><b>Existing GD-adjacent work:</b> Also holds CCS-C Sustainment (C-SAR) contract with SSC, and Advanced Fire Control Ground Infrastructure (AFCGI) with SDA.</li></ul>","<p>2026年4月8日宣布。Kratos獲高達<b>$4.468億</b>OTA，擔任美國太空軍太空系統司令部（SSC）地面管理與整合（GMI）計劃的主承商——為中地球軌道（MEO）韌性導彈預警與追蹤（MWT）星座提供地面架構。</p><ul><li><b>重要性：</b>合約價值相當於Kratos FY2025營收（$13.5億）的~33%。宣布後股價上漲~7%。</li><li><b>Golden Dome相關性：</b>MWT MEO追蹤高超音速滑翔載具和機動彈道導彈——Golden Dome偵測鏈的基石感測器層。Kratos運營接收Boeing 12顆Resilient MWT衛星+BAE Epoch 2衛星的地面系統。</li><li><b>結構性逆轉：</b>Kratos領導團隊包括<b>Northrop Grumman（作為分包商！）</b>、Auria、ASRC Federal和Rise8——呼應C2財團模式，傳統巨頭為專業整合商的分包商。</li><li><b>OpenSpace平台：</b>利用Kratos軟體定義地面系統，整合DoW的FORGE平台實現多供應商互操作。</li><li><b>Carrai（Kratos太空/訓練/網路部總裁）：</b>「我們在先進太空和通訊技術的長期投資正使我們能承擔規模和重要性不斷提升的計劃。」</li><li><b>既有GD相關工作：</b>亦持有SSC的CCS-C維護（C-SAR）合約，以及SDA的先進火控地面基礎設施（AFCGI）。</li></ul>"]}],partners:["Northrop Grumman (GMI sub)","Auria","ASRC Federal","Rise8","Rafael USA (Prometheus)","Rocket Lab (<b>$190M</b> HASTE)","Leidos","Stratolaunch"],mkt:"public",rev:["~$1.35B (FY2025, +17% YoY)","~$13.5億（FY2025，YoY +17%）"],gdVal:["$446.8M GMI (Apr 2026) + $1.45B MACH-TB 2.0 + Prometheus + microwave","$4.468億GMI+$14.5億MACH-TB 2.0+Prometheus+微波"],exp:"vhigh",invNote:["<b>GD purity now rivals RKLB.</b> Cumulative funded backlog: $446.8M GMI (Apr 2026) + $1.45B MACH-TB 2.0 = <b>~$1.9B</b>, or ~140% of FY2025 revenue ($1.35B). GMI contract alone equals ~33% of annual revenue. Crucially, <b>Northrop Grumman is a SUBCONTRACTOR to Kratos</b> on GMI — structural inversion of traditional defense hierarchy mirrors the C2 consortium pattern. Kratos operates the ground brain for the entire MWT MEO constellation (Boeing + BAE satellites). Prometheus JV with Rafael adds long-duration catalyst. Risk: both major awards are OTA (not FFP) — cost overruns could compress margins. Stock +167% over past 12 months.","<b>GD純度現已媲美RKLB。</b>累計已資助積壓訂單：$4.468億GMI（2026年4月）+$14.5億MACH-TB 2.0 = <b>~$19億</b>，約佔FY2025營收（$13.5億）的140%。GMI單獨相當於年營收的~33%。關鍵：<b>Northrop Grumman是Kratos的分包商</b>——傳統國防層級的結構性逆轉，呼應C2財團模式。Kratos運營整個MWT MEO星座（Boeing + BAE衛星）的地面大腦。Prometheus合資增添長期催化劑。風險：兩份主要授標均為OTA——超支可能壓縮利潤。過去12個月股價+167%。"]},
{name:"True Anomaly",ticker:"Private (<b>$389M</b> raised)",cat:"startup",tags:[{label:["Space Startup","太空新創"],color:"orange"},{label:["SBI Prototype","太空攔截器原型"],color:"cyan"},{label:["Jackal/Mosaic","Jackal/Mosaic"],color:"purple"}],summary:["SBI prototype awardee; Jackal autonomous orbital vehicle + Mosaic AI space domain awareness; <b>$30M</b> VICTUS HAZE with Firefly; GEO/cislunar missions 2026; SVP Kitay (ex-Pentagon space policy).","太空攔截器原型；Jackal自主軌道載具+Mosaic AI太空態勢感知；<b>$3,000</b>萬VICTUS HAZE；2026年GEO/月球任務；前五角大樓太空政策主管。"],role:["Builds Jackal (autonomous orbital vehicle) and Mosaic (AI space domain awareness OS). Classified OTA for SBI prototypes (Nov 2025). <b>$30M</b> VICTUS HAZE with Firefly. SVP Kitay (ex-Pentagon space policy lead). <b>$389M</b> raised. JD Vance-linked VC. Jackal/Mosaic scheduled for first independent GEO and cislunar missions 2026.","Jackal自主軌道載具和Mosaic AI太空態勢感知OS。獲機密OTA太空攔截器原型合約。<b>$3,000</b>萬VICTUS HAZE。2026年首次GEO和月球軌道獨立任務。"],contracts:[{name:"SBI Prototype — OTA",value:"~<b>$9</b>-10M (classified, Nov 2025)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["OTA","OTA"],pop:["Nov 2025 – TBD","2025年11月–待定"],desc:["<p>Among 18 firms.</p><ul><li>Jackal provides maneuverable platform potentially adaptable for SBI — autonomous rendezvous and proximity operations capability.</li><li>Company publicly named despite classification.</li><li>Future production contracts worth billions annually.</li></ul>","<p>18家之一。</p><ul><li>Jackal提供可適用於SBI的可機動平台。</li><li>儘管屬機密，公司名稱已公開。</li><li>未來生產合約每年價值數十億。</li></ul>"]},{name:"VICTUS HAZE",value:"<b>$30M</b> (Space Force)",agency:["U.S. Space Force (SpaceWERX)","太空軍（SpaceWERX）"],type:["OTA","OTA"],pop:["2024 – 2026","2024–2026年"],desc:["<p>Tactically responsive space demonstration with Firefly Aerospace.</p><ul><li>Demonstrates rapid orbital maneuver and quick-reaction space operations relevant to Golden Dome responsive orbital engagement requirements.</li></ul>","<p>與Firefly的太空軍戰術響應演示。</p><ul><li>展示Golden Dome所需的快速軌道機動能力。</li></ul>"]}],partners:["Firefly Aerospace","Anduril"],mkt:"private",rev:["Pre-revenue / early-stage ($389M raised)","營收前/早期階段（已融資$3.89億）"],gdVal:["~$40M (SBI OTA + VICTUS HAZE)","~$4,000萬（SBI OTA + VICTUS HAZE）"],exp:"vhigh",invNote:["Private, pre-IPO — not directly investable. Backed by JD Vance-linked VC. Entire business thesis depends on Golden Dome and space defense. Watch for IPO filing or SPAC announcement.","未上市，IPO前——無法直接投資。JD Vance相關VC支持。整體商業論點依賴Golden Dome和太空防禦。"]},
{name:"Apex Space",ticker:"Private (<b>$1B+</b> val.)",cat:"startup",tags:[{label:["Satellite Bus Mfr.","衛星平台製造"],color:"orange"},{label:["Orbital Magazine","軌道彈藥庫"],color:"red"},{label:["Anduril Partner","Anduril合作"],color:"purple"}],summary:["Mass satellite bus manufacturer (200+/yr); 'Orbital Magazine' interceptor host (<b>$6</b>-10M unit); Project Shadow self-funded demo Jun 2026; Anduril partnership; Link-182 pre-integration; two <b>$200M</b> rounds.","量產衛星平台(200+/年)；軌道彈藥庫攔截器載台(<b>$600</b>-1,000萬)；Project Shadow 2026年6月；Anduril合作；Link-182預整合；兩輪各<b>$2</b>億融資。"],role:["Builds interceptor platforms, not interceptors. Aries (~100kg), Nova (~500kg), Comet (~5,000kg). Orbital Magazine: Comet carries up to 6 interceptors. 200+/yr factory capacity. <b>CEO Cinnamon</b>: unit cost <b>$6</b>-10M depending on config. Self-funded <b>$15M</b> Project Shadow (launch NET Jun 2026): Nova bus with software-defined radio transmitting Link-182 (USSF Milnet standard). Pre-integrating into DoD architecture. Anduril partnership for defense payload buses. Two <b>$200M</b> rounds. <b>$1B+</b> valuation.","製造攔截器載台。Comet可搭載6枚攔截器。年產能200+。單價<b>$600</b>-1,000萬。<b>$1,500</b>萬Project Shadow（2026年6月）：Link-182預整合Milnet。與Anduril合作。兩輪各<b>$2</b>億融資。"],contracts:[{name:"Project Shadow (Self-funded Demo)",value:"<b>$15M</b> (NET Jun 2026)",agency:["N/A (company self-funded)","不適用（公司自資）"],type:["Internal investment","內部投資"],pop:["2025 – NET Jun 2026 (launch)","2025–預計2026年6月"],desc:["<p>In-orbit demo of Orbital Magazine — spacecraft storing, thermally controlling, deploying kinetic interceptors. Nova bus with Link-182 (USSF Milnet standard).</p><ul><li><b>CEO Cinnamon</b>: 'We want to mature the tech to make sure it works.</li><li>Then we go to large primes and say we're really good at the Orbital Magazine.' No live interceptors — proving enabling tech.</li><li>Unit cost ~<b>$6</b>-10M.</li><li>Experts estimate thousands of interceptors needed for coverage.</li></ul>","<p>軌道彈藥庫在軌演示。</p><ul><li>Nova平台搭載Link-182（Milnet標準）。</li><li><b>CEO Cinnamon</b>：「我們要確保技術可行，然後告訴大型主承商我們在軌道彈藥庫方面很出色。</li><li>」不搭載實彈。</li><li>專家估計需數千枚攔截器。</li></ul>"]},{name:"Anduril Bus Supply Partnership",value:"Undisclosed",agency:["N/A (commercial partnership)","不適用（商業合作）"],type:["Strategic supply agreement","戰略供應協議"],pop:["2024 – ongoing","2024–進行中"],desc:["<p>Strategic bus supply for Anduril defense payloads.</p><ul><li>Tier-1-to-tier-2 relationship forming ahead of formal Golden Dome production awards.</li><li>Anduril payloads (including SBI components) on Apex mass-manufactured platforms.</li></ul>","<p>為Anduril國防載荷供應衛星平台。</p><ul><li>在正式授標前形成的供應鏈關係。</li></ul>"]}],partners:["Anduril","Link-182/Milnet"],mkt:"private",rev:["Pre-revenue (~$400M raised, $1B+ valuation)","營收前（已融資~$4億，估值$10億+）"],gdVal:["$15M self-funded demo + Anduril partnership (TBD)","$1,500萬自資演示 + Anduril合作（待定）"],exp:"vhigh",invNote:["Private, pre-IPO — not directly investable. Business model is the satellite bus 'arms dealer' for the entire Golden Dome interceptor constellation. If Golden Dome proceeds, Apex could become a multi-billion platform supplier. Project Shadow (Jun 2026) is the key de-risking event.","未上市——無法直接投資。商業模式是Golden Dome攔截器星座的衛星平台「軍火商」。如Golden Dome推進，Apex可能成為數十億平台供應商。Project Shadow（2026年6月）是關鍵去風險事件。"]},
{name:"Booz Allen Hamilton",ticker:"NYSE: BAH",cat:"services",tags:[{label:["Advisory","顧問"],color:"amber"},{label:["Brilliant Swarms","智能蜂群"],color:"pink"},{label:["SHIELD Phase 1","SHIELD第1階段"],color:"emerald"}],summary:["Proposed 'Brilliant Swarms' (1,000-2,000 sats) competing vs SpaceX-Palantir-Anduril; SHIELD Phase 1; systems engineering, digital twin.","「智能蜂群」（1,000-2,000衛星）與SpaceX-Palantir-Anduril競爭；SHIELD第1階段；系統工程、數位孿生。"],role:["Proposed 'Brilliant Swarms' 1,000-2,000 satellite architecture for Golden Dome custody layer. Partners TBD. Competes vs SpaceX-Palantir-Anduril consortium. SHIELD Phase 1 awardee (Dec 2, 2025). Systems engineering, digital twin, simulation.","提出「智能蜂群」1,000-2,000衛星架構。合作夥伴待定。與SpaceX-Palantir-Anduril競爭。SHIELD第1階段授標（2025年12月2日）。"],contracts:[{name:"'Brilliant Swarms' Proposal",value:"TBD (bid stage)",agency:["DoD / Golden Dome Office (bid stage)","國防部（競標階段）"],type:["Proposal (not yet awarded)","提案（尚未授標）"],pop:["TBD","待定"],desc:["<p>Proposed architecture of 1,000–2,000 satellites for Golden Dome's sensing/custody layer — the most ambitious constellation proposal publicly announced. Competes directly against the SpaceX-Palantir-Anduril consortium's 400–1,000 tracking + 200 attack satellite proposal.</p><ul><li>The <b>'Brilliant Swarms'</b> name deliberately echoes the SDI-era <b>'Brilliant Pebbles'</b> concept from the 1980s that Northrop Grumman originally developed.</li><li>Partner companies have not been publicly identified, suggesting either early-stage negotiations or intentional secrecy.</li><li>If selected, this would represent one of the largest satellite constellation procurements in history, potentially exceeding SpaceX's Starlink in total unit count.</li><li>Booz Allen's deep institutional knowledge of DoD acquisition processes and systems engineering experience positions it as an integrator rather than a hardware manufacturer — it would likely orchestrate a consortium of satellite and component manufacturers.</li></ul>","<p>為Golden Dome感知/監測層提出1,000–2,000顆衛星架構——公開宣布中最具雄心的星座提案。直接與SpaceX-Palantir-Anduril聯盟的400–1,000+200顆方案競爭。</p><ul><li>「智能蜂群」名稱刻意呼應1980年代SDI「Brilliant Pebbles」概念。</li><li>合作夥伴未公開。</li><li>如獲選將是有史以來最大的衛星星座採購之一。</li><li>Booz Allen作為整合商而非硬體製造商定位。</li></ul>"]},{name:"SHIELD IDIQ (Phase 1)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>First-tranche awardee (Dec 2, 2025) — among the initial 1,014 companies selected from 2,463 offers.</p><ul><li>Positioned for systems engineering, digital twin environments, simulation, and modeling task orders.</li><li>Booz Allen's deep institutional knowledge of DoD acquisition processes — spanning decades of advisory work across every military service and defense agency — makes it particularly valuable for the enormously complex integration challenges Golden Dome presents.</li><li>Gen.</li><li>Guetlein has described Golden Dome as a 'monster systems engineering problem,' which plays directly to Booz Allen's core competencies in large-scale defense system architecture and integration.</li></ul>","<p>第一批授標（2025年12月2日）——從2,463份投標中選出的1,014家公司之一。</p><ul><li>定位於系統工程、數位孿生、模擬和建模任務訂單。</li><li>Booz Allen對國防部採購流程的深厚制度知識——跨越數十年軍事諮詢——使其在Golden Dome呈現的巨大複雜整合挑戰中特別有價值。</li><li>Guetlein將軍描述Golden Dome為「巨型系統工程問題」，直接契合Booz Allen的核心能力。</li></ul>"]}],partners:["TBD"],mkt:"public",rev:["~$10B (FY2026)","~$100億（FY2026）"],gdVal:["IDIQ qualification only — no funded Task Orders yet","僅IDIQ資格——尚無已資助任務訂單"],exp:"low",invNote:["<b>⚠ IDIQ 'hunting license' only.</b> The Brilliant Swarms proposal is ambitious but unawarded. Zero funded Golden Dome backlog as of March 2026. BAH is a diversified consulting firm — GD would be upside, not base case. Monitor for Task Order wins before assigning GD premium to valuation.","<b>⚠ 僅IDIQ「狩獵許可證」。</b>智能蜂群提案宏大但未授標。截至2026年3月零已資助GD積壓。BAH是多元化顧問公司——GD為上行而非基本情境。在確認任務訂單前不宜賦予GD估值溢價。"]},
{name:"Viasat",ticker:"Nasdaq: VSAT",cat:"satellite",tags:[{label:["Secure Comms","安全通訊"],color:"emerald"},{label:["SHIELD Phase 1","SHIELD第1階段"],color:"blue"}],summary:["SHIELD Phase 1; protected waveforms, resilient satcom transport, network-of-networks modeling, C2 interface simulation.","SHIELD第1階段；保護波形、彈性衛星通訊、網絡建模、C2介面模擬。"],role:["Protected waveforms, resilient satcom transport, C2 interface simulation. Critical for Golden Dome data distribution ensuring sensor data reaches interceptors securely with sufficient bandwidth.","保護波形、彈性衛星通訊、C2介面模擬。確保感測器數據安全到達攔截器。"],contracts:[{name:"SHIELD IDIQ (Phase 1)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Early-confirmed Phase 1 awardee (Dec 2, 2025).</p><ul><li>Viasat's expertise in protected waveforms, resilient satellite communications transport layers, and network-of-networks modeling makes it a natural fit for Golden Dome's data distribution challenge — ensuring that weapons-quality targeting data from orbital sensors (AMTI, SDA tracking layer, Starshield, MWT) reaches ground interceptors, battle management nodes, and fighter crews securely and with sufficient bandwidth in contested electromagnetic environments.</li><li>C2 interface simulation and verification capability is particularly relevant as Golden Dome integrates multiple constellation architectures (AMTI ~600 sats, PWSA tracking/transport layers, Milnet, MWT MEO) into a unified data fabric that must function under peer adversary EW jamming conditions.</li></ul>","<p>早期Phase 1授標者（2025年12月2日）。</p><ul><li>Viasat在保護波形、彈性衛星通訊傳輸層和網絡建模方面的專業使其適合Golden Dome的數據分配挑戰——確保來自軌道感測器（AMTI、SDA追蹤層、Starshield、MWT）的武器級瞄準數據在受電磁對抗的環境中安全且足夠帶寬地到達地面攔截器、戰鬥管理節點和飛行員。</li><li>C2介面模擬能力在Golden Dome整合多個星座架構（AMTI~600顆、PWSA追蹤/傳輸層、Milnet、MWT中軌）為統一數據結構時尤為關鍵——該結構必須在對等對手電子戰干擾條件下運作。</li></ul>"]}],partners:["MDA","USSF"],mkt:"public",rev:["~$4B (FY2025)","~$40億（FY2025）"],gdVal:["IDIQ qualification only — no funded Task Orders yet","僅IDIQ資格——尚無已資助任務訂單"],exp:"low",invNote:["<b>⚠ IDIQ qualification only.</b> Well-positioned for secure comms task orders but zero funded GD backlog currently. Viasat's primary growth driver remains commercial broadband and government satcom, not Golden Dome.","<b>⚠ 僅IDIQ資格。</b>在安全通訊任務訂單方面有競爭力但目前零GD已資助積壓。Viasat主要增長動力仍是商用寬頻和政府衛星通訊。"]},
{name:"Elbit America (Elbit Systems)",ticker:"Nasdaq: ESLT",cat:"prime",tags:[{label:["Israeli Defense","以色列國防"],color:"blue"},{label:["Iron Dome Expertise","Iron Dome專業"],color:"red"},{label:["SHIELD","SHIELD"],color:"emerald"}],summary:["U.S. arm of Elbit Systems — Iron Dome contractor; bridging Israeli missile defense operational experience (thousands of real-world intercepts) into Golden Dome.","Elbit Systems美國分部——Iron Dome承包商；將以色列數千次實戰攔截經驗引入Golden Dome。"],role:["U.S. subsidiary of Israel's Elbit Systems, key Iron Dome contractor. Bridges decades of Israeli missile defense technology and thousands of real-world intercept engagements into Golden Dome.","以色列Elbit Systems美國子公司。將數十年以色列導彈防禦技術和數千次實戰攔截經驗引入Golden Dome。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Iron Dome operational data from thousands of real-world engagements provides unique differentiation directly applicable to Golden Dome's multi-layer architecture.</p><ul><li>Intercept algorithms refined through thousands of actual rocket, missile, and drone engagements since Iron Dome became operational in 2011.</li><li>Sensor fusion techniques proven in the most demanding operational environment — simultaneous multi-threat salvos from Hamas, Hezbollah, and Iranian forces.</li><li>Rapid engagement decision logic enabling sub-second shoot/no-shoot determinations, critical for Golden Dome's automated battle management layer.</li><li>Elbit's EW, C4ISR, and UAV capabilities provide additional touchpoints across Golden Dome's ground and airborne sensing layers.</li></ul>","<p>Iron Dome數千次實戰攔截數據為Golden Dome的多層架構提供獨特且直接適用的優勢。</p><ul><li>自2011年Iron Dome投入運營以來，攔截算法經過數千次實際火箭、導彈和無人機交戰的精煉。</li><li>感測器融合技術在最嚴苛的作戰環境中得到驗證——哈馬斯、真主黨和伊朗同時多重威脅齊射。</li><li>快速交戰決策邏輯實現亞秒級射擊/不射擊判斷，對Golden Dome自動化戰鬥管理層至關重要。</li><li>Elbit的電子戰、C4ISR和無人機能力為Golden Dome的地面和空中感知層提供額外觸點。</li></ul>"]}],partners:["Iron Dome","Rafael"],mkt:"public",rev:["~$6.3B (parent Elbit Systems, FY2025)","~$63億（母公司Elbit Systems，FY2025）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["Parent Elbit Systems trades on Nasdaq (ESLT) and TASE. Iron Dome expertise is a unique differentiator but no funded GD contracts yet. Elbit's growth is driven by broad Israeli/international defense demand rather than Golden Dome specifically.","母公司在Nasdaq（ESLT）和特拉維夫交易所上市。Iron Dome專業是獨特優勢但尚無GD已資助合約。Elbit增長主要由以色列/國際國防需求驅動。"]},
{name:"General Atomics",ticker:"Private",cat:"prime",tags:[{label:["Directed Energy","定向能"],color:"red"},{label:["SHIELD","SHIELD"],color:"emerald"}],summary:["SHIELD-qualified; high-energy lasers, satellite systems, electromagnetic launch — the non-kinetic layer explicitly funded in Golden Dome's <b>$25B</b> reconciliation act.","SHIELD授標；高能雷射、衛星系統、電磁發射——<b>$250</b>億調和法案明確資助的非動能層。"],role:["High-energy lasers, satellite systems, electromagnetic launch. Golden Dome's <b>$25B</b> reconciliation act explicitly funds 'non-kinetic missile defense effects.' Lasers could defeat drone swarms and small missiles at dollars-per-shot versus millions-per-interceptor.","高能雷射、衛星系統、電磁發射。<b>$250</b>億調和法案明確資助「非動能導彈防禦效果」。雷射可以每發數美元擊敗無人機群。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Directed energy, satellite, electromagnetic systems.</p><ul><li><b>$25B</b> reconciliation act explicitly funds 'non-kinetic missile defense effects.<b>' GA'</b>s high-energy lasers could defeat swarms at cents-per-shot — a transformative capability for Golden Dome's lower defense tiers where kinetic interceptors are economically impractical.</li></ul>","<p>定向能、衛星、電磁系統。</p><ul><li><b>$250億</b>調和法案明確資助「非動能效果」。</li><li>GA雷射每發數美元——對Golden Dome低層防禦具變革性。</li></ul>"]}],partners:["MDA","USSF"],mkt:"private",rev:["~$4-5B (private estimate)","~$40-50億（私人估計）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["Private company — not directly investable. Directed energy is a funded Golden Dome line item ($25B reconciliation act) but no specific Task Orders yet. Monitor for directed energy prototype or production awards.","未上市——無法直接投資。定向能是Golden Dome已資助項目（$250億調和法案），但尚無具體任務訂單。"]},
{name:"General Dynamics",ticker:"NYSE: GD",cat:"prime",tags:[{label:["Defense Prime","國防主承商"],color:"blue"},{label:["C4ISR/Cyber","C4ISR/網安"],color:"amber"},{label:["SHIELD","SHIELD"],color:"emerald"}],summary:["SHIELD-qualified for C4ISR, cybersecurity, network integration — Golden Dome's 'system of systems' requires unprecedented cyber hardening across 19 SHIELD performance areas.","SHIELD授標的C4ISR、網路安全、網絡整合——Golden Dome「系統的系統」需要跨19個SHIELD績效領域的前所未有網路加固。"],role:["C4ISR, cybersecurity, secure comms, network integration. Golden Dome's interconnected architecture creates enormous cyber risks across 19 SHIELD performance areas. GD's cybersecurity expertise directly relevant.","C4ISR、網路安全、安全通訊、網絡整合。Golden Dome互聯架構帶來巨大網路風險。GD的網安專業直接相關。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>C4ISR, ground systems, network integration, cybersecurity.</p><ul><li>Golden Dome's cybersecurity challenge is unprecedented — 19 SHIELD performance areas, multiple system classes, cross-classification data flows all requiring hardened architectures against peer EW capabilities.</li><li>An internal analysis (Washington Technology, Jan 2026) calls it the most complex national security endeavor ever.</li></ul>","<p>C4ISR、地面系統、網絡整合、網路安全。</p><ul><li>Golden Dome的網安挑戰前所未有——19個SHIELD績效領域需要抵禦對等電子戰的加固架構。</li><li>被稱為有史以來最複雜的國安工程。</li></ul>"]}],partners:["Lockheed Martin","RTX"],mkt:"public",rev:["~$46B (FY2025)","~$460億（FY2025）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["<b>⚠ IDIQ qualification only.</b> GD's cybersecurity expertise is relevant but no funded Golden Dome contracts. The company's primary catalysts are Gulfstream, Columbia-class submarines, and Army combat vehicles — not missile defense.","<b>⚠ 僅IDIQ資格。</b>GD的網安專業相關但無GD已資助合約。主要催化劑是灣流、Columbia級潛艇和陸軍戰車——非導彈防禦。"]},
{name:"Redwire Corporation",ticker:"NYSE: RDW",cat:"satellite",tags:[{label:["Space Infrastructure","太空基礎設施"],color:"emerald"},{label:["Sensors / Payloads","感測器/載荷"],color:"cyan"},{label:["SHIELD","SHIELD"],color:"blue"}],summary:["SHIELD-qualified space infrastructure and sensor payload company; merchant supplier of critical components (solar arrays, sensors, avionics) across multiple Golden Dome prime contractors.","SHIELD授標的太空基礎設施和感測器載荷公司；為多個Golden Dome主承商供應關鍵組件（太陽能陣列、感測器、航電）。"],role:["Redwire is a merchant supplier of space-qualified components and sensor payloads feeding into the Golden Dome constellation manufacturing ecosystem. As the number of satellites across SDA tracking, transport, MWT, and interceptor constellations scales into the hundreds and eventually thousands, demand for standardized space-qualified components — solar arrays, sensors, avionics, structural elements — grows proportionally. Redwire's SHIELD qualification positions it to compete for digital engineering, sensor development, and space systems manufacturing task orders that support the broader Golden Dome architecture.","Redwire是太空認證組件和感測器載荷的商售供應商，供應Golden Dome星座製造生態系統。隨著SDA追蹤、傳輸、MWT和攔截器星座擴展至數百甚至數千顆，對標準化太空組件的需求同步增長。SHIELD資格使其可競標支持Golden Dome架構的數位工程、感測器開發和太空系統製造任務訂單。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Qualified for space infrastructure, sensor payload, and digital engineering task orders.</p><ul><li>As Golden Dome's constellation scales — SDA tracking layer (72+ sats in T3 alone), transport layer, MWT MEO, AMTI (600 sats), plus SBI constellations potentially numbering in the thousands — demand for Redwire's standardized space-qualified components (solar arrays, avionics, structural systems, sensors) grows proportionally.</li><li>The company's role expands as a merchant supplier into the ecosystem rather than a single-program prime.</li></ul>","<p>可競標太空基礎設施、感測器載荷和數位工程任務訂單。</p><ul><li>隨著Golden Dome星座擴展——僅T3就有72+衛星，加上傳輸層、MWT、AMTI(600顆)、SBI(潛在數千顆)——對Redwire標準化太空組件的需求同步增長。</li><li>作為生態系統商售供應商角色隨規模擴大。</li></ul>"]}],partners:["Multiple SHIELD primes"],mkt:"public",rev:["~$300M (FY2025E)","~$3億（FY2025估計）"],gdVal:["IDIQ qualification only — but merchant supplier upside","僅IDIQ資格——但商售供應商有上行空間"],exp:"med",invNote:["Small-cap with high potential GD leverage. As the constellation scales to thousands of satellites, demand for Redwire's space-qualified components grows proportionally. No funded GD backlog yet, but the merchant supplier model means wins by other primes (L3Harris, Rocket Lab, Northrop) indirectly benefit Redwire. High volatility, speculative.","小型股，高潛在GD槓桿。隨星座擴展至數千顆衛星，對Redwire太空組件的需求同步增長。尚無GD已資助積壓，但商售供應模式意味其他主承商的勝出間接利好Redwire。高波動，投機性。"]},
{name:"Florida State University (FAMU-FSU)",ticker:"Academia",cat:"academia",tags:[{label:["Research Hub","研究樞紐"],color:"amber"},{label:["SHIELD Awardee","SHIELD授標"],color:"emerald"},{label:["Hypersonics / Cyber","高超音速/網安"],color:"cyan"}],summary:["SHIELD IDIQ awardee (Jan 27, 2026); FAMU-FSU College of Engineering as coordinating hub; research spans hypersonics, advanced propulsion, high-performance materials, cybersecurity, and data analytics.","SHIELD IDIQ授標（2026年1月27日）；FAMU-FSU工程學院為協調樞紐；研究涵蓋高超音速、先進推進、高性能材料、網安和數據分析。"],role:["Florida State University was announced on January 27, 2026 as a SHIELD IDIQ awardee — placing FSU in an elite tier of research institutions eligible to compete as prime contractors. The FAMU-FSU College of Engineering serves as the coordinating hub, with projects led by: the Florida Center for Advanced Aero-Propulsion (FCAAP), Center for Advanced Power Systems, High-Performance Materials Institute, National High Magnetic Field Laboratory, and Institute for Strategic Partnerships. Dean Suvranu De: 'This selection provides us with a seat at the table to help develop the next generation of U.S. homeland defense.' FSU can also serve as a subcontractor to other SHIELD awardees. The inclusion of academic institutions highlights that Golden Dome requires not just manufacturing capacity but fundamental R&D in areas like hypersonic materials, advanced propulsion, and AI/cybersecurity.","佛羅里達州立大學於2026年1月27日獲SHIELD IDIQ授標——躋身有資格作為主承商競標的精英研究機構。FAMU-FSU工程學院為協調樞紐，項目由先進航空推進中心（FCAAP）、先進動力系統中心、高性能材料研究所、國家高磁場實驗室和戰略合作研究所牽頭。院長De：「這為我們提供了參與開發下一代美國國土防禦的機會。」FSU也可作為其他SHIELD授標者的分包商。學術機構的納入凸顯Golden Dome不僅需要製造能力，更需要高超音速材料、先進推進和AI/網安等領域的基礎研發。"],contracts:[{name:"SHIELD IDIQ Awardee (Jan 27, 2026)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; no guaranteed funding at base level)","IDIQ（資格授予；基礎合約無保證資金）"],pop:["Jan 2026 – Dec 2035","2026年1月–2035年12月"],desc:["<p>Announced January 27, 2026. FSU placed in elite tier as prime contractor under SHIELD, eligible to compete for task and delivery orders over the next decade.</p><ul><li><b>Coordinating Hub:</b> FAMU-FSU College of Engineering (Dean Suvranu De led proposal).</li><li><b>Research Centers:</b> Florida Center for Advanced Aero-Propulsion (FCAAP), Center for Advanced Power Systems, High-Performance Materials Institute, National High Magnetic Field Laboratory.</li><li><b>Capabilities:</b> R&D, prototyping, systems engineering, cybersecurity, data analytics — interdisciplinary solutions spanning multiple Golden Dome technology domains.</li><li><b>Dual Role:</b> Can compete as prime AND serve as subcontractor to other SHIELD awardees for collaborative partnerships.</li><li>Dean De: 'This is a gateway that allows FSU to compete for task orders over the next decade, underscoring our standing as a top-tier national research hub for defense technology.'</li></ul>","<p>2026年1月27日公布。FSU以主承商身份取得SHIELD資格，可在未來十年競標任務訂單。</p><ul><li><b>協調樞紐：</b>FAMU-FSU工程學院（院長De主導提案）。</li><li><b>研究中心：</b>先進航空推進中心、先進動力系統中心、高性能材料研究所、國家高磁場實驗室。</li><li><b>能力：</b>研發、原型製作、系統工程、網安、數據分析——跨多個Golden Dome技術領域的跨學科方案。</li><li><b>雙重角色：</b>可作為主承商競標，也可作為其他SHIELD授標者的分包商。</li></ul>"]}],partners:["MDA","Other SHIELD awardees (subcontractor role)"],mkt:"academia",rev:["N/A (academic institution)","不適用（學術機構）"],gdVal:["IDIQ qualification — research task orders","IDIQ資格——研究任務訂單"],exp:"low",invNote:["Not investable. Academic research hub providing fundamental R&D in hypersonics, advanced materials, cybersecurity. Indicates Golden Dome's technology base extends beyond industry to universities.","不可投資。提供高超音速、先進材料、網安基礎研發的學術樞紐。"]},
{name:"V2X, Inc.",ticker:"NYSE: VVX",cat:"services",tags:[{label:["Early Warning Radar","早期預警雷達"],color:"amber"},{label:["COBRA DANE/KING","COBRA DANE/KING"],color:"blue"},{label:["SHIELD (Jan 2026)","SHIELD(2026年1月)"],color:"emerald"}],summary:["SHIELD IDIQ awardee (Jan 12, 2026); operates COBRA DANE and COBRA KING early warning radar systems in Alaska; decades of missile defense radar sustainment, systems engineering, and integration expertise.","SHIELD IDIQ授標（2026年1月12日）；運營阿拉斯加COBRA DANE和COBRA KING早期預警雷達系統；數十年導彈防禦雷達維護、系統工程和整合經驗。"],role:["V2X (NYSE: VVX) was announced January 12, 2026 as a SHIELD awardee. The company brings decades of missile defense radar sustainment and systems engineering experience, particularly through its operation of COBRA DANE (a 120-ft phased-array radar at Eareckson Air Station, Alaska, tracking objects up to 2,000 miles away, operational since 1977) and COBRA KING. CEO Jeremy Wensinger: 'The SHIELD IDIQ aligns directly with the work V2X is already performing to protect the nation.' V2X secured a separate $62M contract for COBRA DANE operational readiness in 2025. The company offers advanced analytics, rapid prototyping, cybersecurity, and scalable integrations — directly supporting Golden Dome's ground-based sensor architecture.","V2X（NYSE: VVX）於2026年1月12日獲SHIELD授標。數十年導彈防禦雷達維護和系統工程經驗，特別是運營COBRA DANE（阿拉斯加120英尺相控陣雷達，可追蹤2,000英里外目標，1977年投入運營）和COBRA KING。CEO Wensinger：「SHIELD IDIQ直接契合V2X正在執行的國防工作。」2025年另獲$6,200萬COBRA DANE運營保障合約。"],contracts:[{name:"SHIELD IDIQ Awardee (Jan 12, 2026)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; revenue at task-order level only)","IDIQ（資格授予；僅任務訂單層級有收入）"],pop:["Jan 2026 – Dec 2035","2026年1月–2035年12月"],desc:["<p>Announced January 12, 2026. V2X positioned as a key ground-sensor sustainment partner for Golden Dome.</p><ul><li><b>COBRA DANE:</b> 120-ft phased-array radar, Eareckson Air Station, Alaska. Tracks objects 2,000+ miles. Operational since Aug 1977, modernized 1990s. V2X holds separate $62M contract for operational readiness.</li><li><b>COBRA KING:</b> Additional early warning radar system maintained by V2X.</li><li><b>Capabilities:</b> Advanced analytics, rapid prototyping, cybersecurity, systems engineering, scalable integrations.</li><li><b>CEO Wensinger:</b> 'From supporting cornerstone sensor and missile defense programs like COBRA DANE and COBRA KING to enabling integrated defense operations worldwide, our teams deliver proven results every day.'</li><li>V2X also won $980M ATS IDIQ (Dec 2025) and $100M classified national security contracts (Q4 2025), demonstrating broad DoD integration footprint.</li></ul>","<p>2026年1月12日公布。V2X定位為Golden Dome地面感測器維護關鍵合作夥伴。</p><ul><li><b>COBRA DANE：</b>120英尺相控陣雷達，阿拉斯加Eareckson空軍站。追蹤2,000+英里。1977年投入運營。V2X另持$6,200萬運營保障合約。</li><li><b>COBRA KING：</b>由V2X維護的額外早期預警雷達。</li><li><b>能力：</b>先進分析、快速原型、網安、系統工程。</li><li><b>CEO Wensinger：</b>「SHIELD IDIQ直接契合V2X正在執行的國防工作。」</li></ul>"]}],partners:["MDA","U.S. Space Force","USSF (COBRA DANE)"],mkt:"public",rev:["~$4.75B (FY2026 guidance midpoint)","~$47.5億（FY2026指引中值）"],gdVal:["IDIQ qualification + $62M COBRA DANE (separate)","IDIQ資格 + $6,200萬COBRA DANE（獨立合約）"],exp:"low",invNote:["COBRA DANE sustainment ($62M) is the only confirmed GD-adjacent funded work. SHIELD IDIQ provides upside if V2X wins ground-sensor sustainment task orders. Modest GD exposure relative to total revenue — the company's growth is primarily driven by broader DoD services.","COBRA DANE維護（$6,200萬）是唯一確認的GD相鄰資金。SHIELD IDIQ如贏得地面感測器任務訂單則有上行。GD曝險度相對營收溫和。"]},
{name:"Fuse Federal (Fuse Energy)",ticker:"Private",cat:"services",tags:[{label:["Radiation Testing","輻射測試"],color:"red"},{label:["EMP/EMI Resilience","EMP/EMI韌性"],color:"amber"},{label:["SHIELD (Feb 2026)","SHIELD(2026年2月)"],color:"emerald"}],summary:["SHIELD IDIQ awardee (Feb 2, 2026); radiation testing capabilities ensuring space and ground systems survive contested electromagnetic and radiation environments — critical for Golden Dome resilience.","SHIELD IDIQ授標（2026年2月2日）；輻射測試能力確保太空和地面系統在受對抗的電磁和輻射環境中存活——對Golden Dome韌性至關重要。"],role:["Fuse Federal Enterprise, LLC (subsidiary of California-based fusion company Fuse) was announced February 2, 2026 as a SHIELD awardee. Selected specifically for its radiation testing capabilities that accelerate test and evaluation while strengthening system resilience in contested electromagnetic and radiation environments. This is a critical capability for Golden Dome — space-based interceptors and sensors must survive: nuclear EMP effects from potential adversary detonations, natural space radiation degradation, and adversary directed-energy weapon attacks. By enabling earlier performance validation, Fuse Federal helps defense programs reduce technical risk. The company's core business is nuclear fusion energy, but its federal subsidiary provides essential radiation services to U.S. government defense and energy agencies.","Fuse Federal Enterprise, LLC（加州核融合公司Fuse的子公司）於2026年2月2日獲SHIELD授標。因其輻射測試能力被選中——加速測試評估並增強系統在受對抗的電磁和輻射環境中的韌性。這對Golden Dome至關重要——太空攔截器和感測器必須承受：核EMP效應、自然空間輻射退化和對手定向能武器攻擊。"],contracts:[{name:"SHIELD IDIQ Awardee (Feb 2, 2026)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; no guaranteed funding at base level)","IDIQ（資格授予；基礎合約無保證資金）"],pop:["Feb 2026 – Dec 2035","2026年2月–2035年12月"],desc:["<p>Announced February 2, 2026. Fuse Federal selected for its unique radiation testing and electromagnetic environment resilience capabilities.</p><ul><li><b>Core Capability:</b> Radiation testing that accelerates test & evaluation while ensuring system resilience in contested EM and radiation environments.</li><li><b>Golden Dome Relevance:</b> Space-based interceptors must survive nuclear EMP, natural space radiation, and directed-energy attacks — all requiring validated radiation hardening.</li><li><b>Value Proposition:</b> Enables earlier performance validation, reducing technical risk and accelerating fielding timelines toward the 2028 IOC target.</li><li><b>Parent Company:</b> Fuse (San Leandro, CA) — a nuclear fusion company whose federal subsidiary provides radiation services to U.S. government defense and energy agencies.</li></ul>","<p>2026年2月2日公布。Fuse Federal因其獨特的輻射測試和電磁環境韌性能力被選中。</p><ul><li><b>核心能力：</b>加速測試評估的輻射測試，確保系統在受對抗電磁和輻射環境中的韌性。</li><li><b>Golden Dome相關：</b>太空攔截器必須承受核EMP、自然空間輻射和定向能攻擊。</li><li><b>價值：</b>實現更早期的性能驗證，降低技術風險。</li><li><b>母公司：</b>Fuse（加州San Leandro）——核融合公司，聯邦子公司提供輻射服務。</li></ul>"]}],partners:["MDA","DoW agencies"],mkt:"private",rev:["Pre-revenue (nuclear fusion startup)","營收前（核融合新創）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["Private company — not directly investable. Niche radiation testing capability for space system hardening. SHIELD qualification is a credibility marker but unlikely to drive significant revenue near-term.","未上市——無法直接投資。太空系統加固的利基輻射測試能力。SHIELD資格為信譽標誌但短期難以驅動顯著營收。"]},
{name:"AST SpaceMobile",ticker:"NASDAQ: ASTS",cat:"newspace",tags:[{label:["Direct-to-Cell LEO","直連手機低軌"],color:"cyan"},{label:["Dual-Use Phased Array","雙用途相控陣"],color:"amber"},{label:["SHIELD T3 (Jan 2026)","SHIELD第3批(2026年1月)"],color:"emerald"}],summary:["SHIELD IDIQ awardee (Jan 15, 2026, third tranche); building world's first direct-to-smartphone satellite broadband network; dual-use LEO phased arrays for secure comms, sensing, and C2; also holds SDA Europa Track 2 agreement.","SHIELD IDIQ授標（2026年1月15日，第三批）；建造全球首個直連智慧手機衛星寬頻網絡；雙用途低軌相控陣用於安全通訊、感測和指揮控制；另持SDA Europa Track 2協議。"],role:["AST SpaceMobile (NASDAQ: ASTS) was awarded a SHIELD IDIQ contract on January 15, 2026, as part of the third tranche of 340 companies. The Midland, Texas-headquartered company is building the first and only space-based cellular broadband network accessible directly by standard smartphones. CCO Chris Ivory: 'Being selected as a prime contract awardee for the MDA's SHIELD program is a major validation of our unique, on-orbit, dual-use technology.' ASTS's value proposition for Golden Dome lies in its massive commercial phased-array satellites — the largest ever deployed in LEO — originally designed for 5G broadband but adaptable for resilient C2, battle management, and secure communications. The company is 95% vertically integrated with ~500,000 sq ft of manufacturing facilities, ~1,800 employees, and 3,800+ patents. Deploying 45-60 additional satellites by end of 2026 with dual commercial/government payload capability. Also holds a separate SDA Europa Track 2 Commercial Solutions agreement.","AST SpaceMobile（NASDAQ: ASTS）於2026年1月15日獲SHIELD IDIQ授標，為第三批340家公司之一。總部位於德州Midland，正在建造全球首個可由標準智慧手機直接訪問的天基蜂窩寬頻網絡。CCO Ivory：「被選為MDA SHIELD主承商是對我們獨特在軌雙用途技術的重大驗證。」ASTS對Golden Dome的價值在於其大型商用相控陣衛星——低軌有史以來最大——原為5G寬頻設計，可改造用於彈性C2、戰場管理和安全通訊。95%垂直整合，~50萬平方英尺設施，~1,800員工，3,800+專利。2026年底前再部署45-60顆衛星。另持SDA Europa Track 2協議。"],contracts:[{name:"SHIELD IDIQ Awardee (Jan 15, 2026 — Third Tranche)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; $151B shared ceiling / 2,440 vendors — no guaranteed funding, revenue at task-order level only)","IDIQ（資格授予；$1,510億由2,440家共享上限——無保證資金，僅任務訂單層級有收入）"],pop:["Jan 2026 – Dec 2035 (if all options exercised)","2026年1月–2035年12月（全選項行使）"],desc:["<p>Announced January 16, 2026 (awarded January 15). Part of the third tranche of 340 companies added to the SHIELD roster, bringing total awardees to 2,440.</p><ul><li><b>CCO Chris Ivory:</b> 'Being selected as a prime contract awardee for the MDA's SHIELD program is a major validation of our unique, on-orbit, dual-use technology and our growing capabilities within the defense sector.'</li><li><b>Dual-Use Technology:</b> Large commercial phased-array satellites (largest ever in LEO) designed for 5G broadband, now adaptable for secure C2, battle management, sensing, and resilient communications for Golden Dome.</li><li><b>Vertical Integration:</b> 95% vertically integrated, all major manufacturing under U.S. control (Texas HQ), ~500,000 sq ft facilities, ~1,800 employees, 3,800+ patents.</li><li><b>Deployment:</b> On track to deploy 45–60 additional satellites by end 2026, serving dual commercial (AT&T, Verizon roaming) and government payload roles.</li><li><b>⚠ IDIQ Qualification Only:</b> This is a 'hunting license' — zero funded Golden Dome task orders as of March 2026. The $151B ceiling is shared across all 2,440 vendors. Monitor for actual task order wins before assigning GD revenue contribution.</li></ul>","<p>2026年1月16日宣布（1月15日授標）。為第三批340家公司之一，總授標者達2,440家。</p><ul><li><b>CCO Ivory：</b>「被選為MDA SHIELD主承商是對我們獨特在軌雙用途技術的重大驗證。」</li><li><b>雙用途技術：</b>大型商用相控陣衛星（低軌有史以來最大），為5G設計，可改造用於安全C2、戰場管理、感測。</li><li><b>垂直整合：</b>95%垂直整合，全美製造（德州總部），~50萬平方英尺，~1,800員工，3,800+專利。</li><li><b>部署：</b>2026年底前再部署45–60顆衛星，兼具商業和政府載荷。</li><li><b>⚠ 僅IDIQ資格：</b>「狩獵許可證」——截至2026年3月零已資助GD任務訂單。$1,510億上限由2,440家共享。</li></ul>"]},{name:"SDA Europa Track 2 Commercial Solutions",value:"TBD (agreement, not funded contract)",agency:["Space Development Agency (SDA)","太空發展局（SDA）"],type:["Commercial Solutions Agreement","商業解決方案協議"],pop:["2025 – ongoing","2025–進行中"],desc:["<p>Separate agreement with SDA for the Europa Track 2 Commercial Solutions program, independent of SHIELD.</p><ul><li>Leverages ASTS's commercial LEO constellation for SDA's data transport and communications needs.</li><li>Europa program explores commercial satellite services as supplements to government-owned PWSA satellites.</li><li>Not a funded production contract — positions ASTS for future integration into SDA's architecture.</li></ul>","<p>與SDA簽署的Europa Track 2商業解決方案協議，獨立於SHIELD。</p><ul><li>利用ASTS商業低軌星座滿足SDA數據傳輸和通訊需求。</li><li>Europa計劃探索商業衛星服務作為政府PWSA衛星的補充。</li><li>非已資助生產合約——為未來整合至SDA架構做好定位。</li></ul>"]}],partners:["MDA","SDA","AT&T (commercial)","Verizon (commercial)"],mkt:"public",rev:["Pre-profit (~$10-15M revenue FY2025E, massive cash burn)","虧損中（~$1,000-1,500萬FY2025營收估計，大量現金消耗）"],gdVal:["IDIQ qualification only — zero funded GD task orders","僅IDIQ資格——零已資助GD任務訂單"],exp:"low",invNote:["<b>⚠ IDIQ 'hunting license' only — zero funded Golden Dome backlog.</b> ASTS stock surged 15%+ on the SHIELD announcement, but this is purely IDIQ qualification with no guaranteed revenue. The company is pre-profit with significant cash burn (~$1.06 EPS loss FY2025). Golden Dome's relevance to ASTS is the dual-use validation of its phased-array technology, not near-term revenue. The real catalysts remain commercial service launch, AT&T/Verizon roaming revenue, and constellation deployment execution. ASTS trades at extreme growth multiples (~450%+ 1yr gain) — any GD premium is speculative until task orders materialize. Also holds SDA Europa Track 2 agreement (separate from SHIELD).","<b>⚠ 僅IDIQ「狩獵許可證」——零已資助Golden Dome積壓訂單。</b>ASTS股價在SHIELD宣布後飆升15%+，但純屬IDIQ資格，無保證收入。公司尚未盈利，大量現金消耗（FY2025 EPS虧損~$1.06）。Golden Dome對ASTS的意義在於相控陣技術的雙用途驗證，而非近期營收。真正催化劑仍是商業服務啟動、AT&T/Verizon漫遊收入和星座部署執行。ASTS以極端增長倍數交易（1年+450%）——任何GD溢價在任務訂單實現前均為投機。另持SDA Europa Track 2協議。"]},
{name:"Aalyria Technologies",ticker:"Private (Google/Alphabet spin-out)",cat:"tech",tags:[{label:["Network Orchestration","網絡編排"],color:"purple"},{label:["Google/Alphabet Origin","Google/Alphabet衍生"],color:"cyan"},{label:["C2 Consortium Prime","C2財團主導"],color:"pink"}],summary:["C2 software consortium member (WSJ Mar 24 2026); networking company adapted technology from Google parent Alphabet; develops Spacetime AI-driven network orchestration platform.","C2軟體財團成員（WSJ 2026年3月24日）；從Google母公司Alphabet衍生的網絡公司；開發Spacetime AI驅動網絡編排平台。"],role:["Aalyria Technologies was identified by WSJ (March 24, 2026) as part of the Golden Dome C2 software consortium alongside Anduril, Palantir, Scale AI, and Swoop Technologies. The company adapted networking technology from Google parent Alphabet (Project Loon heritage). Develops Spacetime, an AI-driven network orchestration platform for multi-domain comms across space, air, ground, and maritime. For Golden Dome, Spacetime could orchestrate data links between thousands of satellites, ground radars, and interceptors ensuring sub-second latency. Previously won DARPA Space-BACN contract for optical inter-satellite links. C2 software targeting summer 2026 live demo. WSJ notes: tech companies are PRIMES in the consortium; traditional defense contractors (LMT, NOC, RTX) are SUBCONTRACTORS.","WSJ（2026年3月24日）確認Aalyria為Golden Dome C2軟體財團成員。從Google母公司Alphabet（Project Loon）衍生網絡技術。開發Spacetime AI網絡編排平台，管理太空、空中、地面和海上異構通訊。為Golden Dome編排數千顆衛星和攔截平台的數據鏈路。曾獲DARPA Space-BACN合約。C2軟體目標2026年夏演示。科技公司為主承商，國防巨頭為分包商。"],contracts:[{name:"Golden Dome C2 Software Consortium",value:"Classified (9-firm consortium)",agency:["Golden Dome Office (DRPM Guetlein)","Golden Dome辦公室（Guetlein將軍）"],type:["Classified (consortium — tech firms as primes, defense primes as subs)","機密（財團——科技公司為主承商，國防巨頭為分包商）"],pop:["2025 – Summer 2026 (live demo target)","2025–2026年夏（實戰演示目標）"],desc:["<p>WSJ exclusive (March 24, 2026): Aalyria part of 9-firm C2 consortium. C2 is the ONLY Golden Dome program run directly from Guetlein's office.</p><ul><li><b>Role:</b> Network orchestration — managing multi-domain comms across Golden Dome architecture via Spacetime platform.</li><li><b>Heritage:</b> Adapted technology from Google/Alphabet (Project Loon).</li><li><b>DARPA:</b> Won Space-BACN contract for optical inter-satellite links.</li><li><b>Structure:</b> Tech companies (Anduril, Palantir, Aalyria, Scale AI, Swoop) are PRIMES; defense primes (LMT, NOC, RTX) are SUBCONTRACTORS.</li><li><b>Timeline:</b> Software ready for live testing summer 2026.</li><li><b>Guetlein quote:</b> C2 is the 'secret sauce' and the 'glue layer' connecting sensors, radars, and interceptors.</li></ul>","<p>WSJ獨家（2026年3月24日）：Aalyria為C2財團成員。C2是Guetlein辦公室唯一直接管理的Golden Dome項目。</p><ul><li><b>角色：</b>網絡編排——通過Spacetime平台管理跨域通訊。</li><li><b>技術傳承：</b>源自Google/Alphabet（Project Loon）。</li><li><b>結構：</b>科技公司為主承商，國防巨頭為分包商。</li><li><b>時間線：</b>2026年夏實戰演示。</li></ul>"]}],partners:["Anduril","Palantir","Scale AI","Swoop Technologies","LMT (sub)","NOC (sub)","RTX (sub)"],mkt:"private",rev:["Pre-revenue (VC-backed)","營收前（VC支持）"],gdVal:["C2 consortium member — potentially transformative","C2財團成員——潛在變革性"],exp:"high",invNote:["Private — not investable. Google/Alphabet heritage gives unique network orchestration IP. If C2 software succeeds in summer 2026, becomes embedded in $185B system. Watch for funding rounds or acquisition.","未上市。Google/Alphabet背景。如C2成功將嵌入$1,850億系統。關注融資或收購。"]},
{name:"Scale AI",ticker:"Private (~$14B val.)",cat:"tech",tags:[{label:["AI Data Infrastructure","AI數據基礎設施"],color:"purple"},{label:["Data Labeling / RLHF","數據標註/RLHF"],color:"amber"},{label:["C2 Consortium Prime","C2財團主導"],color:"pink"}],summary:["C2 software consortium member (WSJ Mar 24 2026); leading AI data infrastructure company providing data labeling and RLHF for defense AI models; CEO Alexandr Wang.","C2軟體財團成員（WSJ 2026年3月24日）；領先AI數據基礎設施公司；為國防AI模型提供數據標註和RLHF；CEO Wang。"],role:["Scale AI was identified by WSJ (March 24, 2026) as part of the Golden Dome C2 software consortium. Founded by Alexandr Wang (youngest self-made billionaire). Leading AI data infrastructure company providing data labeling, model evaluation, and RLHF. Deep DoD relationships: contracts with Army, Air Force, intelligence community. For Golden Dome, Scale AI ensures AI models processing satellite sensor data and interceptor telemetry are properly trained and validated. Part of expanded Anduril-Palantir AI consortium (Dec 2024). C2 software targeting summer 2026 live demonstration.","WSJ（2026年3月24日）確認Scale AI為C2財團成員。CEO Wang（最年輕白手起家億萬富翁）。領先AI數據基礎設施公司。與陸軍、空軍和情報界有深度合約。為Golden Dome確保AI模型得到正確訓練和驗證。Anduril-Palantir AI聯盟擴展成員。"],contracts:[{name:"Golden Dome C2 Software Consortium",value:"Classified (9-firm consortium)",agency:["Golden Dome Office (DRPM Guetlein)","Golden Dome辦公室（Guetlein將軍）"],type:["Classified (consortium member)","機密（財團成員）"],pop:["2025 – Summer 2026 (live demo target)","2025–2026年夏（實戰演示目標）"],desc:["<p>WSJ exclusive (March 24, 2026): Scale AI part of 9-firm C2 consortium.</p><ul><li><b>Role:</b> AI data infrastructure — training and evaluating AI models powering autonomous threat detection.</li><li><b>DoD Track Record:</b> Existing contracts with Army, Air Force, IC.</li><li><b>CEO:</b> Alexandr Wang — youngest self-made billionaire, advocate for AI in national security.</li><li><b>Valuation:</b> ~$14B.</li><li><b>Consortium Expansion:</b> Part of Anduril-Palantir AI consortium (e // ═══════════════════════════════════════════
// Engine
// ═══════════════════════════════════════════
let lang='en',curFilter='all',curSearch='',activeCo=null;
const $=id=>document.getElementById(id);
const grid=$('companyGrid'),searchInput=$('searchInput'),searchClear=$('searchClear'),resultCount=$('resultCount'),
  m1Overlay=$('m1Overlay'),m1Accent=$('m1Accent'),m1Name=$('m1Name'),m1Ticker=$('m1Ticker'),m1Tags=$('m1Tags'),m1Body=$('m1Body'),m1Close=$('m1Close'),
  m2Overlay=$('m2Overlay'),m2Body=$('m2Body'),m2Back=$('m2Back'),m2Close=$('m2Close');

const t=key=>L[lang][key]||key;
const tx=(v)=>Array.isArray(v)?(lang==='zh'?v[1]:v[0]):v;

function applyLang(){
  document.querySelectorAll('[data-i]').forEach(el=>{const k=el.dataset.i;if(L[lang][k])el.textContent=L[lang][k];});
  searchInput.placeholder=t('searchPh');
  // timeline
  const tlEl=$('timeline'); tlEl.innerHTML='';
  t('tl').forEach(x=>{
    tlEl.innerHTML+=`<div class="tl-item"><div class="tl-date">${x.d}</div><div class="tl-dot ${x.c}"></div><div class="tl-label">${x.l}</div></div>`;
  });
  // filters
  const fg=$('filterGroup'); fg.innerHTML='';
  const fk=t('filters');
  Object.keys(fk).forEach(k=>{
    const b=document.createElement('button'); b.className='filter-btn'+(curFilter===k?' active':''); b.dataset.filter=k; b.textContent=fk[k];
    b.onclick=()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=k;renderCards();};
    fg.appendChild(b);
  });
  renderCards();
  // lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.dataset.lang===lang);});
}

function matchesSearch(c,q){
  if(!q) return true;
  const s=[c.name,c.ticker,tx(c.summary),tx(c.role),...c.tags.map(t=>tx(t.label)),...(c.contracts||[]).flatMap(ct=>[ct.name,ct.value,tx(ct.desc)]),...(c.partners||[])].join(' ').toLowerCase();
  return q.toLowerCase().split(/\s+/).every(t=>s.includes(t));
}

function renderCards(){
  grid.innerHTML='';
  const f=C.filter(c=>(curFilter==='all'||c.cat===curFilter)&&matchesSearch(c,curSearch));
  resultCount.textContent=f.length+' / '+C.length;
  if(!f.length){grid.innerHTML='<div class="no-results"><span>⌀</span>'+(lang==='zh'?'沒有符合搜尋條件的公司。':'No companies match your search.')+'</div>';return;}
  f.forEach(c=>{
    const d=document.createElement('div');d.className='company-card';d.dataset.cat=c.cat;
    let mktHtml='';
    if(c.mkt){
      const mktClass=c.mkt==='public'?'public':c.mkt==='private'?'private':'academia-mkt';
      const mktLabel=c.mkt==='public'?'✅ '+t('publicLabel'):c.mkt==='private'?'🔒 '+t('privateLabel'):'🎓 '+t('academiaLabel');
      mktHtml=`<div class="card-market ${mktClass}" style="margin-top:0">${mktLabel}</div>`;
    }
    let expHtml='';
    if(c.exp){
      const expLabel=c.exp==='low'?t('lowExp'):c.exp==='med'?t('medExp'):c.exp==='high'?t('highExp'):t('vhighExp');
      expHtml=`<div class="exposure-bar" style="margin-top:12px;margin-bottom:4px"><div class="exposure-label">${t('exposureLabel')}</div><div class="exposure-track"><div class="exposure-fill exp-${c.exp}"></div></div><div class="exposure-text exp-${c.exp}">${expLabel}</div></div>`;
    }
    d.innerHTML=`<div class="card-top"><div><div class="company-name">${c.name}</div><div class="company-ticker">${c.ticker}</div></div>${mktHtml}</div>${expHtml}<div class="card-tags">${c.tags.map(t=>`<span class="tag tag-${t.color}">${tx(t.label)}</span>`).join('')}</div><div class="card-summary">${tx(c.summary)}</div><div class="card-cta">${t('clickForDetails')}</div>`;
    d.onclick=()=>openL1(c);grid.appendChild(d);
  });
}

function openL1(c){
  activeCo=c;
  m1Accent.className='modal-accent '+c.cat;
  m1Name.textContent=c.name;m1Ticker.textContent=c.ticker;
  m1Tags.innerHTML=c.tags.map(t=>`<span class="tag tag-${t.color}">${tx(t.label)}</span>`).join('');
  let h=`<div class="modal-section"><div class="modal-label">${t('roleLabel')}</div><div class="modal-text">${tx(c.role)}</div></div>`;
  if(c.contracts&&c.contracts.length){
    h+=`<div class="modal-section"><div class="modal-label">${t('contractsLabel')}</div>`;
    c.contracts.forEach((ct,i)=>{h+=`<div class="contract-card" data-ci="${i}"><div class="contract-name">${ct.name}</div><div class="contract-value">${ct.value}</div><div class="contract-hint">${t('clickDetail')}</div></div>`;});
    h+=`</div>`;
  }
  if(c.partners&&c.partners.length){h+=`<div class="modal-section"><div class="modal-label">${t('partnersLabel')}</div><div class="partner-list">${c.partners.map(p=>`<span class="partner-chip">${p}</span>`).join('')}</div></div>`;}
  if(c.mkt){
    h+='<div class="modal-inv-panel"><div class="modal-inv-title">'+t('invTitle')+'</div><div class="inv-grid">';
    h+='<div class="inv-item"><div class="inv-k">'+t('marketLabel')+'</div><div class="inv-v">'+(c.mkt==='public'?'✅ '+t('publicLabel')+' ('+c.ticker+')':c.mkt==='private'?'🔒 '+t('privateLabel'):'🎓 '+t('academiaLabel'))+'</div></div>';
    h+='<div class="inv-item"><div class="inv-k">'+t('revLabel')+'</div><div class="inv-v">'+tx(c.rev)+'</div></div>';
    h+='<div class="inv-item"><div class="inv-k">'+t('gdBacklogLabel')+'</div><div class="inv-v">'+tx(c.gdVal)+'</div></div>';
    h+='<div class="inv-item"><div class="inv-k">'+t('exposureLabel')+'</div><div class="inv-v exposure-text exp-'+c.exp+'">'+(c.exp==='low'?t('lowExp'):c.exp==='med'?t('medExp'):c.exp==='high'?t('highExp'):t('vhighExp'))+'</div></div>';
    if(c.invNote)h+='<div class="inv-note">'+tx(c.invNote)+'</div>';
    h+='</div></div>';
  }
  m1Body.innerHTML=h;
  m1Body.querySelectorAll('.contract-card').forEach(el=>{el.onclick=e=>{e.stopPropagation();openL2(+el.dataset.ci);};});
  m1Overlay.classList.add('open');document.body.style.overflow='hidden';
}
function closeL1(){m1Overlay.classList.remove('open');document.body.style.overflow='';activeCo=null;}
m1Close.onclick=closeL1;m1Overlay.onclick=e=>{if(e.target===m1Overlay)closeL1();};

function openL2(i){
  if(!activeCo)return;const ct=activeCo.contracts[i];
  let metaHtml='';
  if(ct.agency||ct.type||ct.pop){
    metaHtml='<div class="modal2-meta">';
    if(ct.agency)metaHtml+='<div class="meta-row"><div class="meta-k">'+t('agencyLabel')+'</div><div class="meta-v">'+tx(ct.agency)+'</div></div>';
    if(ct.type)metaHtml+='<div class="meta-row"><div class="meta-k">'+t('typeLabel')+'</div><div class="meta-v">'+tx(ct.type)+'</div></div>';
    if(ct.pop)metaHtml+='<div class="meta-row"><div class="meta-k">'+t('popLabel')+'</div><div class="meta-v">'+tx(ct.pop)+'</div></div>';
    metaHtml+='</div>';
  }
  m2Body.innerHTML=`<div class="modal2-contract-title">${ct.name}</div><div class="modal2-contract-company">${activeCo.name} · ${activeCo.ticker}</div><div class="modal2-value-box"><div class="modal2-value-label">${t('contractValue')}</div><div class="modal2-value">${ct.value}</div></div>${metaHtml}<div style="margin-top:12px"><div class="modal2-desc-label">${t('fullDesc')}</div><div class="modal2-desc">${tx(ct.desc)}</div></div>`;
  m2Overlay.classList.add('open');
}
function closeL2(){m2Overlay.classList.remove('open');}
m2Back.onclick=closeL2;m2Close.onclick=()=>{closeL2();closeL1();};m2Overlay.onclick=e=>{if(e.target===m2Overlay)closeL2();};
document.onkeydown=e=>{if(e.key==='Escape'){if(m2Overlay.classList.contains('open'))closeL2();else closeL1();}};

searchInput.oninput=()=>{curSearch=searchInput.value.trim();searchClear.classList.toggle('show',curSearch.length>0);renderCards();};
searchClear.onclick=()=>{searchInput.value='';curSearch='';searchClear.classList.remove('show');searchInput.focus();renderCards();};

document.querySelectorAll('.lang-btn').forEach(b=>{b.onclick=()=>{lang=b.dataset.lang;applyLang();
document.querySelector('.timeline-scroll').addEventListener('scroll',function(){this.classList.add('scrolled');},{once:true});};});

applyLang();
document.querySelector('.timeline-scroll').addEventListener('scroll',function(){this.classList.add('scrolled');},{once:true});

async function checkPwd(){
  var storedHash="bebc79734038e684e2d9bd00f8a0bcebb96fbffbdb699ffd076732806fe1cde0";
  var input=document.getElementById("pwd-input").value;
  var encoder=new TextEncoder();
  var data=encoder.encode(input);
  var hashBuffer=await crypto.subtle.digest("SHA-256",data);
  var hashArray=Array.from(new Uint8Array(hashBuffer));
  var hashHex=hashArray.map(function(b){return b.toString(16).padStart(2,"0")}).join("");
  if(hashHex===storedHash){
    document.getElementById("pwd-screen").style.display="none";
    document.querySelector(".app").style.display="block";
  }else{
    document.getElementById("pwd-error").style.display="block";
    document.getElementById("pwd-input").value="";
    document.getElementById("pwd-input").focus();
  }
}
</script>
