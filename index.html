{name:"General Atomics",ticker:"Private",cat:"prime",tags:[{label:["Directed Energy","定向能"],color:"red"},{label:["SHIELD","SHIELD"],color:"emerald"}],summary:["SHIELD-qualified; high-energy lasers, satellite systems, electromagnetic launch — the non-kinetic layer explicitly funded in Golden Dome's <b>$25B</b> reconciliation act.","SHIELD授標；高能雷射、衛星系統、電磁發射——<b>$250</b>億調和法案明確資助的非動能層。"],role:["High-energy lasers, satellite systems, electromagnetic launch. Golden Dome's <b>$25B</b> reconciliation act explicitly funds 'non-kinetic missile defense effects.' Lasers could defeat drone swarms and small missiles at dollars-per-shot versus millions-per-interceptor.","高能雷射、衛星系統、電磁發射。<b>$250</b>億調和法案明確資助「非動能導彈防禦效果」。雷射可以每發數美元擊敗無人機群。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Directed energy, satellite, electromagnetic systems.</p><ul><li><b>$25B</b> reconciliation act explicitly funds 'non-kinetic missile defense effects.<b>' GA'</b>s high-energy lasers could defeat swarms at cents-per-shot — a transformative capability for Golden Dome's lower defense tiers where kinetic interceptors are economically impractical.</li></ul>","<p>定向能、衛星、電磁系統。</p><ul><li><b>$250億</b>調和法案明確資助「非動能效果」。</li><li>GA雷射每發數美元——對Golden Dome低層防禦具變革性。</li></ul>"]}],partners:["MDA","USSF"],mkt:"private",rev:["~$4-5B (private estimate)","~$40-50億（私人估計）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["Private company — not directly investable. Directed energy is a funded Golden Dome line item ($25B reconciliation act) but no specific Task Orders yet. Monitor for directed energy prototype or production awards.","未上市——無法直接投資。定向能是Golden Dome已資助項目（$250億調和法案），但尚無具體任務訂單。"]},
{name:"General Dynamics",ticker:"NYSE: GD",cat:"prime",tags:[{label:["Defense Prime","國防主承商"],color:"blue"},{label:["C4ISR/Cyber","C4ISR/網安"],color:"amber"},{label:["SHIELD","SHIELD"],color:"emerald"}],summary:["SHIELD-qualified for C4ISR, cybersecurity, network integration — Golden Dome's 'system of systems' requires unprecedented cyber hardening across 19 SHIELD performance areas.","SHIELD授標的C4ISR、網路安全、網絡整合——Golden Dome「系統的系統」需要跨19個SHIELD績效領域的前所未有網路加固。"],role:["C4ISR, cybersecurity, secure comms, network integration. Golden Dome's interconnected architecture creates enormous cyber risks across 19 SHIELD performance areas. GD's cybersecurity expertise directly relevant.","C4ISR、網路安全、安全通訊、網絡整合。Golden Dome互聯架構帶來巨大網路風險。GD的網安專業直接相關。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>C4ISR, ground systems, network integration, cybersecurity.</p><ul><li>Golden Dome's cybersecurity challenge is unprecedented — 19 SHIELD performance areas, multiple system classes, cross-classification data flows all requiring hardened architectures against peer EW capabilities.</li><li>An internal analysis (Washington Technology, Jan 2026) calls it the most complex national security endeavor ever.</li></ul>","<p>C4ISR、地面系統、網絡整合、網路安全。</p><ul><li>Golden Dome的網安挑戰前所未有——19個SHIELD績效領域需要抵禦對等電子戰的加固架構。</li><li>被稱為有史以來最複雜的國安工程。</li></ul>"]}],partners:["Lockheed Martin","RTX"],mkt:"public",rev:["~$46B (FY2025)","~$460億（FY2025）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["<b>⚠ IDIQ qualification only.</b> GD's cybersecurity expertise is relevant but no funded Golden Dome contracts. The company's primary catalysts are Gulfstream, Columbia-class submarines, and Army combat vehicles — not missile defense.","<b>⚠ 僅IDIQ資格。</b>GD的網安專業相關但無GD已資助合約。主要催化劑是灣流、Columbia級潛艇和陸軍戰車——非導彈防禦。"]},
{name:"Redwire Corporation",ticker:"NYSE: RDW",cat:"satellite",tags:[{label:["Space Infrastructure","太空基礎設施"],color:"emerald"},{label:["Sensors / Payloads","感測器/載荷"],color:"cyan"},{label:["SHIELD","SHIELD"],color:"blue"}],summary:["SHIELD-qualified space infrastructure and sensor payload company; merchant supplier of critical components (solar arrays, sensors, avionics) across multiple Golden Dome prime contractors.","SHIELD授標的太空基礎設施和感測器載荷公司；為多個Golden Dome主承商供應關鍵組件（太陽能陣列、感測器、航電）。"],role:["Redwire is a merchant supplier of space-qualified components and sensor payloads feeding into the Golden Dome constellation manufacturing ecosystem. As the number of satellites across SDA tracking, transport, MWT, and interceptor constellations scales into the hundreds and eventually thousands, demand for standardized space-qualified components — solar arrays, sensors, avionics, structural elements — grows proportionally. Redwire's SHIELD qualification positions it to compete for digital engineering, sensor development, and space systems manufacturing task orders that support the broader Golden Dome architecture.","Redwire是太空認證組件和感測器載荷的商售供應商，供應Golden Dome星座製造生態系統。隨著SDA追蹤、傳輸、MWT和攔截器星座擴展至數百甚至數千顆，對標準化太空組件的需求同步增長。SHIELD資格使其可競標支持Golden Dome架構的數位工程、感測器開發和太空系統製造任務訂單。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Qualified for space infrastructure, sensor payload, and digital engineering task orders.</p><ul><li>As Golden Dome's constellation scales — SDA tracking layer (72+ sats in T3 alone), transport layer, MWT MEO, AMTI (600 sats), plus SBI constellations potentially numbering in the thousands — demand for Redwire's standardized space-qualified components (solar arrays, avionics, structural systems, sensors) grows proportionally.</li><li>The company's role expands as a merchant supplier into the ecosystem rather than a single-program prime.</li></ul>","<p>可競標太空基礎設施、感測器載荷和數位工程任務訂單。</p><ul><li>隨著Golden Dome星座擴展——僅T3就有72+衛星，加上傳輸層、MWT、AMTI(600顆)、SBI(潛在數千顆)——對Redwire標準化太空組件的需求同步增長。</li><li>作為生態系統商售供應商角色隨規模擴大。</li></ul>"]}],partners:["Multiple SHIELD primes"],mkt:"public",rev:["~$300M (FY2025E)","~$3億（FY2025估計）"],gdVal:["IDIQ qualification only — but merchant supplier upside","僅IDIQ資格——但商售供應商有上行空間"],exp:"med",invNote:["Small-cap with high potential GD leverage. As the constellation scales to thousands of satellites, demand for Redwire's space-qualified components grows proportionally. No funded GD backlog yet, but the merchant supplier model means wins by other primes (L3Harris, Rocket Lab, Northrop) indirectly benefit Redwire. High volatility, speculative.","小型股，高潛在GD槓桿。隨星座擴展至數千顆衛星，對Redwire太空組件的需求同步增長。尚無GD已資助積壓，但商售供應模式意味其他主承商的勝出間接利好Redwire。高波動，投機性。"]},
{name:"Florida State University (FAMU-FSU)",ticker:"Academia",cat:"academia",tags:[{label:["Research Hub","研究樞紐"],color:"amber"},{label:["SHIELD Awardee","SHIELD授標"],color:"emerald"},{label:["Hypersonics / Cyber","高超音速/網安"],color:"cyan"}],summary:["SHIELD IDIQ awardee (Jan 27, 2026); FAMU-FSU College of Engineering as coordinating hub; research spans hypersonics, advanced propulsion, high-performance materials, cybersecurity, and data analytics.","SHIELD IDIQ授標（2026年1月27日）；FAMU-FSU工程學院為協調樞紐；研究涵蓋高超音速、先進推進、高性能材料、網安和數據分析。"],role:["Florida State University was announced on January 27, 2026 as a SHIELD IDIQ awardee — placing FSU in an elite tier of research institutions eligible to compete as prime contractors. The FAMU-FSU College of Engineering serves as the coordinating hub, with projects led by: the Florida Center for Advanced Aero-Propulsion (FCAAP), Center for Advanced Power Systems, High-Performance Materials Institute, National High Magnetic Field Laboratory, and Institute for Strategic Partnerships. Dean Suvranu De: 'This selection provides us with a seat at the table to help develop the next generation of U.S. homeland defense.' FSU can also serve as a subcontractor to other SHIELD awardees. The inclusion of academic institutions highlights that Golden Dome requires not just manufacturing capacity but fundamental R&D in areas like hypersonic materials, advanced propulsion, and AI/cybersecurity.","佛羅里達州立大學於2026年1月27日獲SHIELD IDIQ授標——躋身有資格作為主承商競標的精英研究機構。FAMU-FSU工程學院為協調樞紐，項目由先進航空推進中心（FCAAP）、先進動力系統中心、高性能材料研究所、國家高磁場實驗室和戰略合作研究所牽頭。院長De：「這為我們提供了參與開發下一代美國國土防禦的機會。」FSU也可作為其他SHIELD授標者的分包商。學術機構的納入凸顯Golden Dome不僅需要製造能力，更需要高超音速材料、先進推進和AI/網安等領域的基礎研發。"],contracts:[{name:"SHIELD IDIQ Awardee (Jan 27, 2026)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; no guaranteed funding at base level)","IDIQ（資格授予；基礎合約無保證資金）"],pop:["Jan 2026 – Dec 2035","2026年1月–2035年12月"],desc:["<p>Announced January 27, 2026. FSU placed in elite tier as prime contractor under SHIELD, eligible to compete for task and delivery orders over the next decade.</p><ul><li><b>Coordinating Hub:</b> FAMU-FSU College of Engineering (Dean Suvranu De led proposal).</li><li><b>Research Centers:</b> Florida Center for Advanced Aero-Propulsion (FCAAP), Center for Advanced Power Systems, High-Performance Materials Institute, National High Magnetic Field Laboratory.</li><li><b>Capabilities:</b> R&D, prototyping, systems engineering, cybersecurity, data analytics — interdisciplinary solutions spanning multiple Golden Dome technology domains.</li><li><b>Dual Role:</b> Can compete as prime AND serve as subcontractor to other SHIELD awardees for collaborative partnerships.</li><li>Dean De: 'This is a gateway that allows FSU to compete for task orders over the next decade, underscoring our standing as a top-tier national research hub for defense technology.'</li></ul>","<p>2026年1月27日公布。FSU以主承商身份取得SHIELD資格，可在未來十年競標任務訂單。</p><ul><li><b>協調樞紐：</b>FAMU-FSU工程學院（院長De主導提案）。</li><li><b>研究中心：</b>先進航空推進中心、先進動力系統中心、高性能材料研究所、國家高磁場實驗室。</li><li><b>能力：</b>研發、原型製作、系統工程、網安、數據分析——跨多個Golden Dome技術領域的跨學科方案。</li><li><b>雙重角色：</b>可作為主承商競標，也可作為其他SHIELD授標者的分包商。</li></ul>"]}],partners:["MDA","Other SHIELD awardees (subcontractor role)"],mkt:"academia",rev:["N/A (academic institution)","不適用（學術機構）"],gdVal:["IDIQ qualification — research task orders","IDIQ資格——研究任務訂單"],exp:"low",invNote:["Not investable. Academic research hub providing fundamental R&D in hypersonics, advanced materials, cybersecurity. Indicates Golden Dome's technology base extends beyond industry to universities.","不可投資。提供高超音速、先進材料、網安基礎研發的學術樞紐。"]},
{name:"V2X, Inc.",ticker:"NYSE: VVX",cat:"services",tags:[{label:["Early Warning Radar","早期預警雷達"],color:"amber"},{label:["COBRA DANE/KING","COBRA DANE/KING"],color:"blue"},{label:["SHIELD (Jan 2026)","SHIELD(2026年1月)"],color:"emerald"}],summary:["SHIELD IDIQ awardee (Jan 12, 2026); operates COBRA DANE and COBRA KING early warning radar systems in Alaska; decades of missile defense radar sustainment, systems engineering, and integration expertise.","SHIELD IDIQ授標（2026年1月12日）；運營阿拉斯加COBRA DANE和COBRA KING早期預警雷達系統；數十年導彈防禦雷達維護、系統工程和整合經驗。"],role:["V2X (NYSE: VVX) was announced January 12, 2026 as a SHIELD awardee. The company brings decades of missile defense radar sustainment and systems engineering experience, particularly through its operation of COBRA DANE (a 120-ft phased-array radar at Eareckson Air Station, Alaska, tracking objects up to 2,000 miles away, operational since 1977) and COBRA KING. CEO Jeremy Wensinger: 'The SHIELD IDIQ aligns directly with the work V2X is already performing to protect the nation.' V2X secured a separate $62M contract for COBRA DANE operational readiness in 2025. The company offers advanced analytics, rapid prototyping, cybersecurity, and scalable integrations — directly supporting Golden Dome's ground-based sensor architecture.","V2X（NYSE: VVX）於2026年1月12日獲SHIELD授標。數十年導彈防禦雷達維護和系統工程經驗，特別是運營COBRA DANE（阿拉斯加120英尺相控陣雷達，可追蹤2,000英里外目標，1977年投入運營）和COBRA KING。CEO Wensinger：「SHIELD IDIQ直接契合V2X正在執行的國防工作。」2025年另獲$6,200萬COBRA DANE運營保障合約。"],contracts:[{name:"SHIELD IDIQ Awardee (Jan 12, 2026)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; revenue at task-order level only)","IDIQ（資格授予；僅任務訂單層級有收入）"],pop:["Jan 2026 – Dec 2035","2026年1月–2035年12月"],desc:["<p>Announced January 12, 2026. V2X positioned as a key ground-sensor sustainment partner for Golden Dome.</p><ul><li><b>COBRA DANE:</b> 120-ft phased-array radar, Eareckson Air Station, Alaska. Tracks objects 2,000+ miles. Operational since Aug 1977, modernized 1990s. V2X holds separate $62M contract for operational readiness.</li><li><b>COBRA KING:</b> Additional early warning radar system maintained by V2X.</li><li><b>Capabilities:</b> Advanced analytics, rapid prototyping, cybersecurity, systems engineering, scalable integrations.</li><li><b>CEO Wensinger:</b> 'From supporting cornerstone sensor and missile defense programs like COBRA DANE and COBRA KING to enabling integrated defense operations worldwide, our teams deliver proven results every day.'</li><li>V2X also won $980M ATS IDIQ (Dec 2025) and $100M classified national security contracts (Q4 2025), demonstrating broad DoD integration footprint.</li></ul>","<p>2026年1月12日公布。V2X定位為Golden Dome地面感測器維護關鍵合作夥伴。</p><ul><li><b>COBRA DANE：</b>120英尺相控陣雷達，阿拉斯加Eareckson空軍站。追蹤2,000+英里。1977年投入運營。V2X另持$6,200萬運營保障合約。</li><li><b>COBRA KING：</b>由V2X維護的額外早期預警雷達。</li><li><b>能力：</b>先進分析、快速原型、網安、系統工程。</li><li><b>CEO Wensinger：</b>「SHIELD IDIQ直接契合V2X正在執行的國防工作。」</li></ul>"]}],partners:["MDA","U.S. Space Force","USSF (COBRA DANE)"],mkt:"public",rev:["~$4.75B (FY2026 guidance midpoint)","~$47.5億（FY2026指引中值）"],gdVal:["IDIQ qualification + $62M COBRA DANE (separate)","IDIQ資格 + $6,200萬COBRA DANE（獨立合約）"],exp:"low",invNote:["COBRA DANE sustainment ($62M) is the only confirmed GD-adjacent funded work. SHIELD IDIQ provides upside if V2X wins ground-sensor sustainment task orders. Modest GD exposure relative to total revenue — the company's growth is primarily driven by broader DoD services.","COBRA DANE維護（$6,200萬）是唯一確認的GD相鄰資金。SHIELD IDIQ如贏得地面感測器任務訂單則有上行。GD曝險度相對營收溫和。"]},
{name:"Fuse Federal (Fuse Energy)",ticker:"Private",cat:"services",tags:[{label:["Radiation Testing","輻射測試"],color:"red"},{label:["EMP/EMI Resilience","EMP/EMI韌性"],color:"amber"},{label:["SHIELD (Feb 2026)","SHIELD(2026年2月)"],color:"emerald"}],summary:["SHIELD IDIQ awardee (Feb 2, 2026); radiation testing capabilities ensuring space and ground systems survive contested electromagnetic and radiation environments — critical for Golden Dome resilience.","SHIELD IDIQ授標（2026年2月2日）；輻射測試能力確保太空和地面系統在受對抗的電磁和輻射環境中存活——對Golden Dome韌性至關重要。"],role:["Fuse Federal Enterprise, LLC (subsidiary of California-based fusion company Fuse) was announced February 2, 2026 as a SHIELD awardee. Selected specifically for its radiation testing capabilities that accelerate test and evaluation while strengthening system resilience in contested electromagnetic and radiation environments. This is a critical capability for Golden Dome — space-based interceptors and sensors must survive: nuclear EMP effects from potential adversary detonations, natural space radiation degradation, and adversary directed-energy weapon attacks. By enabling earlier performance validation, Fuse Federal helps defense programs reduce technical risk. The company's core business is nuclear fusion energy, but its federal subsidiary provides essential radiation services to U.S. government defense and energy agencies.","Fuse Federal Enterprise, LLC（加州核融合公司Fuse的子公司）於2026年2月2日獲SHIELD授標。因其輻射測試能力被選中——加速測試評估並增強系統在受對抗的電磁和輻射環境中的韌性。這對Golden Dome至關重要——太空攔截器和感測器必須承受：核EMP效應、自然空間輻射退化和對手定向能武器攻擊。"],contracts:[{name:"SHIELD IDIQ Awardee (Feb 2, 2026)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ (qualification; no guaranteed funding at base level)","IDIQ（資格授予；基礎合約無保證資金）"],pop:["Feb 2026 – Dec 2035","2026年2月–2035年12月"],desc:["<p>Announced February 2, 2026. Fuse Federal selected for its unique radiation testing and electromagnetic environment resilience capabilities.</p><ul><li><b>Core Capability:</b> Radiation testing that accelerates test & evaluation while ensuring system resilience in contested EM and radiation environments.</li><li><b>Golden Dome Relevance:</b> Space-based interceptors must survive nuclear EMP, natural space radiation, and directed-energy attacks — all requiring validated radiation hardening.</li><li><b>Value Proposition:</b> Enables earlier performance validation, reducing technical risk and accelerating fielding timelines toward the 2028 IOC target.</li><li><b>Parent Company:</b> Fuse (San Leandro, CA) — a nuclear fusion company whose federal subsidiary provides radiation services to U.S. government defense and energy agencies.</li></ul>","<p>2026年2月2日公布。Fuse Federal因其獨特的輻射測試和電磁環境韌性能力被選中。</p><ul><li><b>核心能力：</b>加速測試評估的輻射測試，確保系統在受對抗電磁和輻射環境中的韌性。</li><li><b>Golden Dome相關：</b>太空攔截器必須承受核EMP、自然空間輻射和定向能攻擊。</li><li><b>價值：</b>實現更早期的性能驗證，降低技術風險。</li><li><b>母公司：</b>Fuse（加州San Leandro）——核融合公司，聯邦子公司提供輻射服務。</li></ul>"]}],partners:["MDA","DoW agencies"],mkt:"private",rev:["Pre-revenue (nuclear fusion startup)","營收前（核融合新創）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["Private company — not directly investable. Niche radiation testing capability for space system hardening. SHIELD qualification is a credibility marker but unlikely to drive significant revenue near-term.","未上市——無法直接投資。太空系統加固的利基輻射測試能力。SHIELD資格為信譽標誌但短期難以驅動顯著營收。"]}
];

// ═══════════════════════════════════════════
// Engine
// ═══════════════════════════════════════════
let lang='en',curFilter='all',curSearch='',activeCo=null;
const $=id=>document.getElementById(id);
const grid=$('companyGrid'),searchInput=$('searchInput'),searchClear=$('searchClear'),resultCount=$('resultCount'),
  m1Overlay=$('m1Overlay'),m1Accent=$('m1Accent'),m1Name=$('m1Name'),m1Ticker=$('m1Ticker'),m1Tags=$('m1Tags'),m1Body=$('m1Body'),m1Close=$('m1Close'),
  m2Overlay=$('m2Overlay'),m2Body=$('m2Body'),m2Back=$('m2Back'),m2Close=$('m2Close');

const t=key=>L[lang][key]||key;
const tx=(v)=>Array.isArray(v)?(lang==='zh'?v[1]:v[0]):v;

function applyLang(){
  document.querySelectorAll('[data-i]').forEach(el=>{const k=el.dataset.i;if(L[lang][k])el.textContent=L[lang][k];});
  searchInput.placeholder=t('searchPh');
  // timeline
  const tlEl=$('timeline'); tlEl.innerHTML='';
  t('tl').forEach(x=>{
    tlEl.innerHTML+=`<div class="tl-item"><div class="tl-date">${x.d}</div><div class="tl-dot ${x.c}"></div><div class="tl-label">${x.l}</div></div>`;
  });
  // filters
  const fg=$('filterGroup'); fg.innerHTML='';
  const fk=t('filters');
  Object.keys(fk).forEach(k=>{
    const b=document.createElement('button'); b.className='filter-btn'+(curFilter===k?' active':''); b.dataset.filter=k; b.textContent=fk[k];
    b.onclick=()=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=k;renderCards();};
    fg.appendChild(b);
  });
  renderCards();
  // lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.dataset.lang===lang);});
}

function matchesSearch(c,q){
  if(!q) return true;
  const s=[c.name,c.ticker,tx(c.summary),tx(c.role),...c.tags.map(t=>tx(t.label)),...(c.contracts||[]).flatMap(ct=>[ct.name,ct.value,tx(ct.desc)]),...(c.partners||[])].join(' ').toLowerCase();
  return q.toLowerCase().split(/\s+/).every(t=>s.includes(t));
}

function renderCards(){
  grid.innerHTML='';
  const f=C.filter(c=>(curFilter==='all'||c.cat===curFilter)&&matchesSearch(c,curSearch));
  resultCount.textContent=f.length+' / '+C.length;
  if(!f.length){grid.innerHTML='<div class="no-results"><span>⌀</span>'+(lang==='zh'?'沒有符合搜尋條件的公司。':'No companies match your search.')+'</div>';return;}
  f.forEach(c=>{
    const d=document.createElement('div');d.className='company-card';d.dataset.cat=c.cat;
    let mktHtml='';
    if(c.mkt){
      const mktClass=c.mkt==='public'?'public':c.mkt==='private'?'private':'academia-mkt';
      const mktLabel=c.mkt==='public'?'✅ '+t('publicLabel'):c.mkt==='private'?'🔒 '+t('privateLabel'):'🎓 '+t('academiaLabel');
      mktHtml=`<div class="card-market ${mktClass}" style="margin-top:0">${mktLabel}</div>`;
    }
    let expHtml='';
    if(c.exp){
      const expLabel=c.exp==='low'?t('lowExp'):c.exp==='med'?t('medExp'):c.exp==='high'?t('highExp'):t('vhighExp');
      expHtml=`<div class="exposure-bar" style="margin-top:12px;margin-bottom:4px"><div class="exposure-label">${t('exposureLabel')}</div><div class="exposure-track"><div class="exposure-fill exp-${c.exp}"></div></div><div class="exposure-text exp-${c.exp}">${expLabel}</div></div>`;
    }
    d.innerHTML=`<div class="card-top"><div><div class="company-name">${c.name}</div><div class="company-ticker">${c.ticker}</div></div>${mktHtml}</div>${expHtml}<div class="card-tags">${c.tags.map(t=>`<span class="tag tag-${t.color}">${tx(t.label)}</span>`).join('')}</div><div class="card-summary">${tx(c.summary)}</div><div class="card-cta">${t('clickForDetails')}</div>`;
    d.onclick=()=>openL1(c);grid.appendChild(d);
  });
}

function openL1(c){
  activeCo=c;
  m1Accent.className='modal-accent '+c.cat;
  m1Name.textContent=c.name;m1Ticker.textContent=c.ticker;
  m1Tags.innerHTML=c.tags.map(t=>`<span class="tag tag-${t.color}">${tx(t.label)}</span>`).join('');
  let h=`<div class="modal-section"><div class="modal-label">${t('roleLabel')}</div><div class="modal-text">${tx(c.role)}</div></div>`;
  if(c.contracts&&c.contracts.length){
    h+=`<div class="modal-section"><div class="modal-label">${t('contractsLabel')}</div>`;
    c.contracts.forEach((ct,i)=>{h+=`<div class="contract-card" data-ci="${i}"><div class="contract-name">${ct.name}</div><div class="contract-value">${ct.value}</div><div class="contract-hint">${t('clickDetail')}</div></div>`;});
    h+=`</div>`;
  }
  if(c.partners&&c.partners.length){h+=`<div class="modal-section"><div class="modal-label">${t('partnersLabel')}</div><div class="partner-list">${c.partners.map(p=>`<span class="partner-chip">${p}</span>`).join('')}</div></div>`;}
  if(c.mkt){
    h+='<div class="modal-inv-panel"><div class="modal-inv-title">'+t('invTitle')+'</div><div class="inv-grid">';
    h+='<div class="inv-item"><div class="inv-k">'+t('marketLabel')+'</div><div class="inv-v">'+(c.mkt==='public'?'✅ '+t('publicLabel')+' ('+c.ticker+')':c.mkt==='private'?'🔒 '+t('privateLabel'):'🎓 '+t('academiaLabel'))+'</div></div>';
    h+='<div class="inv-item"><div class="inv-k">'+t('revLabel')+'</div><div class="inv-v">'+tx(c.rev)+'</div></div>';
    h+='<div class="inv-item"><div class="inv-k">'+t('gdBacklogLabel')+'</div><div class="inv-v">'+tx(c.gdVal)+'</div></div>';
    h+='<div class="inv-item"><div class="inv-k">'+t('exposureLabel')+'</div><div class="inv-v exposure-text exp-'+c.exp+'">'+(c.exp==='low'?t('lowExp'):c.exp==='med'?t('medExp'):c.exp==='high'?t('highExp'):t('vhighExp'))+'</div></div>';
    if(c.invNote)h+='<div class="inv-note">'+tx(c.invNote)+'</div>';
    h+='</div></div>';
  }
  m1Body.innerHTML=h;
  m1Body.querySelectorAll('.contract-card').forEach(el=>{el.onclick=e=>{e.stopPropagation();openL2(+el.dataset.ci);};});
  m1Overlay.classList.add('open');document.body.style.overflow='hidden';
}
function closeL1(){m1Overlay.classList.remove('open');document.body.style.overflow='';activeCo=null;}
m1Close.onclick=closeL1;m1Overlay.onclick=e=>{if(e.target===m1Overlay)closeL1();};

function openL2(i){
  if(!activeCo)return;const ct=activeCo.contracts[i];
  let metaHtml='';
  if(ct.agency||ct.type||ct.pop){
    metaHtml='<div class="modal2-meta">';
    if(ct.agency)metaHtml+='<div class="meta-row"><div class="meta-k">'+t('agencyLabel')+'</div><div class="meta-v">'+tx(ct.agency)+'</div></div>';
    if(ct.type)metaHtml+='<div class="meta-row"><div class="meta-k">'+t('typeLabel')+'</div><div class="meta-v">'+tx(ct.type)+'</div></div>';
    if(ct.pop)metaHtml+='<div class="meta-row"><div class="meta-k">'+t('popLabel')+'</div><div class="meta-v">'+tx(ct.pop)+'</div></div>';
    metaHtml+='</div>';
  }
  m2Body.innerHTML=`<div class="modal2-contract-title">${ct.name}</div><div class="modal2-contract-company">${activeCo.name} · ${activeCo.ticker}</div><div class="modal2-value-box"><div class="modal2-value-label">${t('contractValue')}</div><div class="modal2-value">${ct.value}</div></div>${metaHtml}<div style="margin-top:12px"><div class="modal2-desc-label">${t('fullDesc')}</div><div class="modal2-desc">${tx(ct.desc)}</div></div>`;
  m2Overlay.classList.add('open');
}
function closeL2(){m2Overlay.classList.remove('open');}
m2Back.onclick=closeL2;m2Close.onclick=()=>{closeL2();closeL1();};m2Overlay.onclick=e=>{if(e.target===m2Overlay)closeL2();};
document.onkeydown=e=>{if(e.key==='Escape'){if(m2Overlay.classList.contains('open'))closeL2();else closeL1();}};

searchInput.oninput=()=>{curSearch=searchInput.value.trim();searchClear.classList.toggle('show',curSearch.length>0);renderCards();};
searchClear.onclick=()=>{searchInput.value='';curSearch='';searchClear.classList.remove('show');searchInput.focus();renderCards();};

document.querySelectorAll('.lang-btn').forEach(b=>{b.onclick=()=>{lang=b.dataset.lang;applyLang();};});

applyLang();
</script>
</body>
</html>
