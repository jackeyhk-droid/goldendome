<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Dome — Project Relationship Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#151d2e;--bg-card-hover:#1a2540;--bg-modal:#141c2f;--bg-modal2:#0f1625;--border:#1e2d4a;--border-active:#3b82f6;--text-primary:#e2e8f0;--text-secondary:#94a3c0;--text-muted:#5f7196;--accent-blue:#3b82f6;--accent-cyan:#06b6d4;--accent-emerald:#10b981;--accent-amber:#f59e0b;--accent-red:#ef4444;--accent-purple:#8b5cf6;--accent-pink:#ec4899;--accent-orange:#f97316;--radius:10px;--font-sans:'DM Sans','Noto Sans TC',sans-serif;--font-mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;font-size:16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(59,130,246,.08),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(6,182,212,.05),transparent);pointer-events:none;z-index:0}
.app{position:relative;z-index:1}
.header{padding:36px 44px 28px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(17,24,39,.97) 0%,var(--bg-primary) 100%)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap}
.header-left{flex:1}
.project-label{font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent-cyan);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.project-label .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-cyan);animation:pd 2s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:1;box-shadow:0 0 4px var(--accent-cyan)}50%{opacity:.4;box-shadow:0 0 10px var(--accent-cyan)}}
.project-title{font-size:34px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#e2e8f0 30%,var(--accent-cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.project-subtitle{font-size:15px;color:var(--text-secondary);margin-top:6px;max-width:660px;line-height:1.55}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0}
.lang-btn{font-family:var(--font-sans);font-size:13px;font-weight:600;padding:7px 14px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--accent-blue);color:#fff}
.header-stats{display:flex;gap:16px;flex-wrap:wrap}
.stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;min-width:138px;text-align:center}
.stat-value{font-family:var(--font-mono);font-size:24px;font-weight:700;color:var(--accent-blue)}
.stat-value.cyan{color:var(--accent-cyan)}.stat-value.emerald{color:var(--accent-emerald)}.stat-value.amber{color:var(--accent-amber)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-top:3px}
.timeline-section{padding:24px 44px 20px;border-bottom:1px solid var(--border);background:var(--bg-secondary);overflow:hidden}
.timeline-title{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px}
.timeline-scroll{overflow-x:auto;padding-bottom:6px}
.timeline{display:flex;position:relative;min-width:max-content}
.timeline::before{content:'';position:absolute;top:8px;left:0;right:0;height:2px;background:var(--border)}
.tl-item{flex-shrink:0;text-align:center;position:relative;padding:0 16px;min-width:128px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--accent-blue);margin:3px auto 10px;position:relative;z-index:1;border:2px solid var(--bg-secondary)}
.tl-dot.cyan{background:var(--accent-cyan)}.tl-dot.emerald{background:var(--accent-emerald)}.tl-dot.amber{background:var(--accent-amber)}.tl-dot.red{background:var(--accent-red)}
.tl-date{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--accent-blue)}
.tl-label{font-size:12px;color:var(--text-secondary);margin-top:4px;line-height:1.45;max-width:150px;margin-left:auto;margin-right:auto}
.toolbar{position:sticky;top:0;z-index:100;background:rgba(10,14,23,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 44px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:0 1 320px;min-width:200px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none}
.search-input{width:100%;font-family:var(--font-sans);font-size:14px;padding:10px 14px 10px 40px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--text-muted)}.search-input:focus{border-color:var(--accent-blue)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;display:none;padding:2px 6px;border-radius:4px}
.search-clear:hover{color:var(--text-primary);background:rgba(255,255,255,.06)}.search-clear.show{display:block}
.filter-group{display:flex;gap:7px;flex-wrap:wrap;flex:1}
.filter-btn{font-family:var(--font-sans);font-size:13px;font-weight:600;padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--accent-blue);color:var(--text-primary)}
.filter-btn.active{background:var(--accent-blue);border-color:var(--accent-blue);color:#fff}
.result-count{font-family:var(--font-mono);font-size:12px;color:var(--text-muted);white-space:nowrap}
.main{padding:24px 44px 60px}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted);font-size:16px}
.no-results span{display:block;font-size:40px;margin-bottom:12px}
.company-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.company-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:3px 0 0 3px;opacity:.7;transition:opacity .25s}
.company-card:hover{border-color:var(--border-active);background:var(--bg-card-hover);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.35),0 0 0 1px rgba(59,130,246,.1)}
.company-card:hover::before{opacity:1}
.company-card[data-cat=prime]::before{background:var(--accent-blue)}.company-card[data-cat=newspace]::before{background:var(--accent-cyan)}.company-card[data-cat=tech]::before{background:var(--accent-purple)}.company-card[data-cat=satellite]::before{background:var(--accent-emerald)}.company-card[data-cat=startup]::before{background:var(--accent-orange)}.company-card[data-cat=services]::before{background:var(--accent-amber)}.company-card[data-cat=academia]::before{background:#64748b}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.company-name{font-size:18px;font-weight:700;letter-spacing:-.2px;line-height:1.3}
.company-ticker{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text-muted);margin-top:3px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.tag{font-size:11px;font-weight:600;padding:4px 9px;border-radius:4px;letter-spacing:.3px;text-transform:uppercase}
.tag-blue{background:rgba(59,130,246,.15);color:#60a5fa}.tag-cyan{background:rgba(6,182,212,.15);color:#22d3ee}.tag-emerald{background:rgba(16,185,129,.15);color:#34d399}.tag-amber{background:rgba(245,158,11,.15);color:#fbbf24}.tag-purple{background:rgba(139,92,246,.15);color:#a78bfa}.tag-red{background:rgba(239,68,68,.15);color:#f87171}.tag-orange{background:rgba(249,115,22,.15);color:#fb923c}.tag-pink{background:rgba(236,72,153,.15);color:#f472b6}
.card-summary{font-size:14px;color:var(--text-secondary);margin-top:12px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-cta{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--accent-blue);margin-top:14px;letter-spacing:.5px;opacity:0;transition:opacity .2s}
.company-card:hover .card-cta{opacity:1}
.modal-overlay{position:fixed;inset:0;z-index:9000;background:rgba(5,8,15,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .25s ease}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg-modal);border:1px solid var(--border);border-radius:14px;width:100%;max-width:740px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(59,130,246,.08);transform:translateY(20px) scale(.97);transition:transform .3s ease;position:relative}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal::-webkit-scrollbar{width:6px}.modal::-webkit-scrollbar-track{background:transparent}.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.modal-accent{height:4px;border-radius:14px 14px 0 0}
.modal-accent.prime{background:var(--accent-blue)}.modal-accent.newspace{background:var(--accent-cyan)}.modal-accent.tech{background:var(--accent-purple)}.modal-accent.satellite{background:var(--accent-emerald)}.modal-accent.startup{background:var(--accent-orange)}.modal-accent.services{background:var(--accent-amber)}.modal-accent.academia{background:#64748b}
.modal-header{padding:28px 32px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.modal-company-name{font-size:26px;font-weight:700;letter-spacing:-.3px}
.modal-ticker{font-family:var(--font-mono);font-size:13px;color:var(--text-muted);margin-top:4px}
.modal-close{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text-secondary);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.modal-close:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.modal-tags-wrap{display:flex;gap:7px;flex-wrap:wrap;padding:14px 32px 0}
.modal-body{padding:20px 32px 32px}
.modal-section{margin-bottom:24px}.modal-section:last-child{margin-bottom:0}
.modal-label{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.modal-label::after{content:'';flex:1;height:1px;background:var(--border)}
.modal-text{font-size:15px;color:var(--text-secondary);line-height:1.7}
.contract-card{background:rgba(59,130,246,.04);border:1px solid rgba(59,130,246,.12);border-radius:8px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative}
.contract-card:hover{border-color:rgba(59,130,246,.35);background:rgba(59,130,246,.08);transform:translateX(3px)}
.contract-card::after{content:'▸';position:absolute;right:16px;top:16px;font-family:var(--font-mono);font-size:14px;color:var(--text-muted);transition:color .2s}
.contract-card:hover::after{color:var(--accent-blue)}
.contract-name{font-size:15px;font-weight:700;color:var(--text-primary);padding-right:28px}
.contract-value{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--accent-emerald);margin-top:4px}
.contract-hint{font-size:11px;color:var(--text-muted);margin-top:4px;font-style:italic}
.partner-list{display:flex;gap:8px;flex-wrap:wrap}
.partner-chip{font-size:13px;font-weight:500;padding:5px 14px;border-radius:14px;background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.modal2-overlay{position:fixed;inset:0;z-index:9500;background:rgba(5,8,15,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s ease}
.modal2-overlay.open{opacity:1;pointer-events:auto}
.modal2{background:var(--bg-modal2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(59,130,246,.1);transform:translateY(16px) scale(.96);transition:transform .25s ease;position:relative}
.modal2-overlay.open .modal2{transform:translateY(0) scale(1)}
.modal2::-webkit-scrollbar{width:5px}.modal2::-webkit-scrollbar-track{background:transparent}.modal2::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.modal2-header{padding:24px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.modal2-back{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text-secondary);height:32px;padding:0 14px;border-radius:6px;cursor:pointer;font-family:var(--font-mono);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:all .15s}
.modal2-back:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.modal2-close{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text-secondary);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.modal2-close:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.modal2-body{padding:20px 28px 28px}
.modal2-contract-title{font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.35}
.modal2-contract-company{font-size:13px;color:var(--text-muted);margin-bottom:16px}
.modal2-value-box{display:inline-block;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:10px 18px;margin-bottom:20px}
.modal2-value-label{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px}
.modal2-value{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--accent-emerald)}
.modal2-meta{margin:16px 0;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:2px 0;overflow:hidden}
.meta-row{display:flex;align-items:baseline;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.04);gap:12px}
.meta-row:last-child{border-bottom:none}
.meta-k{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);min-width:110px;flex-shrink:0}
.meta-v{font-size:14px;color:var(--text-primary);font-weight:500}
.modal2-desc-label{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px}
.modal2-desc{font-size:15px;color:var(--text-secondary);line-height:1.75}
.modal2-desc p{margin:0 0 12px;line-height:1.7}
.modal2-desc p:last-child{margin-bottom:0}
.modal2-desc ul{margin:0 0 14px;padding-left:0;list-style:none}
.modal2-desc li{position:relative;padding:6px 0 6px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;line-height:1.6}
.modal2-desc li::before{content:'›';position:absolute;left:0;color:var(--accent-blue);font-weight:700}
.modal2-desc li:last-child{border-bottom:none}
.modal2-desc strong,.modal2-desc b{color:var(--text-primary);font-weight:600}
.modal2-desc .kv{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;margin:12px 0;font-size:14px}
.modal2-desc .kv dt{color:var(--text-muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.8px;padding-top:2px;font-family:var(--font-mono)}
.modal2-desc .kv dd{color:var(--text-secondary);margin:0;line-height:1.55}
.modal2-desc .ctx{margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted);line-height:1.65;font-style:italic}

.card-market{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.5px;padding:3px 8px;border-radius:4px;margin-top:8px}
.card-market.public{background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2)}
.card-market.private{background:rgba(245,158,11,.08);color:#fbbf24;border:1px solid rgba(245,158,11,.15)}
.card-market.academia-mkt{background:rgba(100,116,139,.1);color:#94a3b8;border:1px solid rgba(100,116,139,.2)}
.exposure-bar{margin-top:10px;display:flex;align-items:center;gap:8px}
.exposure-label{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);white-space:nowrap}
.exposure-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;max-width:120px}
.exposure-fill{height:100%;border-radius:3px;transition:width .3s}
.exposure-fill.exp-low{width:15%;background:#3b82f6}
.exposure-fill.exp-med{width:45%;background:#f59e0b}
.exposure-fill.exp-high{width:75%;background:#f97316}
.exposure-fill.exp-vhigh{width:100%;background:#ef4444}
.exposure-text{font-size:10px;font-weight:600;white-space:nowrap}
.exposure-text.exp-low{color:#60a5fa}
.exposure-text.exp-med{color:#fbbf24}
.exposure-text.exp-high{color:#fb923c}
.exposure-text.exp-vhigh{color:#f87171}
.modal-inv-panel{margin-top:16px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:14px 18px}
.modal-inv-title{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.modal-inv-title::after{content:'';flex:1;height:1px;background:var(--border)}
.inv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.inv-item{display:flex;flex-direction:column;gap:2px}
.inv-k{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted)}
.inv-v{font-size:14px;font-weight:600;color:var(--text-primary)}
.inv-v.warn{color:var(--accent-amber)}
.inv-note{grid-column:1/-1;margin-top:6px;font-size:12px;color:var(--text-muted);line-height:1.6;padding-top:8px;border-top:1px solid rgba(255,255,255,.04)}
.inv-note b{color:var(--accent-amber);font-weight:600}
.disclaimer{padding:24px 44px;text-align:center;font-size:11px;color:var(--text-muted);letter-spacing:.3px;line-height:1.7;border-top:1px solid var(--border)}
@media(max-width:768px){
  .inv-grid{grid-template-columns:1fr}
  .disclaimer{padding-left:18px;padding-right:18px}
  .header,.toolbar,.main,.timeline-section{padding-left:18px;padding-right:18px}
  .header-top{flex-direction:column}
  .header-right{align-items:flex-start;width:100%}
  .header-stats{width:100%}
  .stat-box{flex:1;min-width:90px;padding:10px 12px}
  .stat-value{font-size:20px}
  .company-grid{grid-template-columns:1fr}
  .project-title{font-size:26px}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{flex:1 1 100%}
  .modal,.modal2{max-width:100%;border-radius:10px}
  .modal-header{padding:22px 20px 0}
  .modal-tags-wrap{padding:12px 20px 0}
  .modal-body{padding:16px 20px 24px}
  .modal2-header{padding:20px 18px 0}
  .modal2-body{padding:16px 18px 24px}
}
</style>
</head>
<body>
  <style>
  /* 先隱藏原本的圖譜內容 */
  .app { display: none; }

  /* 密碼鎖畫面的專屬設計 (深色主題) */
  #pwd-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0e17; 
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: var(--font-sans);
    color: #e2e8f0;
  }
  .pwd-box {
    background: #141c2f;
    border: 1px solid #1e2d4a;
    padding: 36px 40px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6);

{name:"Lockheed Martin",ticker:"NYSE: LMT",cat:"prime",tags:[{label:["Defense Prime","國防主承商"],color:"blue"},{label:["SBI On-Orbit Demo 2028","太空攔截器2028在軌演示"],color:"cyan"},{label:["C2BMC Lead","C2BMC主導"],color:"emerald"},{label:["C2 Consortium (9-firm)","C2財團(九企業)"],color:"pink"}],summary:["SBI prototype with on-orbit demo planned by 2028 (<b>CEO Taiclet</b>); leads MDA's C2BMC; Center for Innovation in VA for Golden Dome C2 prototyping; NGI prime; THAAD/Aegis/GBI; <b>$1.65B</b> capex for Space Park.","太空攔截器原型，計劃2028年前在軌演示（<b>CEO Taiclet</b>）；主導C2BMC；維吉尼亞州創新中心進行Golden Dome C2原型開發；NGI主承商；<b>$16.5</b>億資本支出。"],role:["Lockheed Martin is the most deeply embedded legacy prime. Leads MDA's National Team for C2BMC — the 'world's most powerful missile defense software network.' <b>CEO Taiclet</b> (Q3 2025 earnings): building 'full-up operational prototypes that will go into space,' targeting on-orbit SBI demonstration by 2028. Amanda Pound (Director Advanced Programs, Aug 5 2025 Huntsville briefing): exploring orbital lasers and maneuverable kinetic projectiles. Center for Innovation opened in Virginia for Golden Dome C2 prototyping using open systems architecture fusing capabilities 'from seabed to space.' Named prime vendor for C2 architecture. Classified SBI contract. <b>$1.65B</b> FY2026 capex for Space Park high-rate kill vehicle production. NGI prime (beat Northrop, Apr 2024). Core systems: PAC-3 MSE, THAAD, SBIRS, LRDR (first ICBM tracking Jun 2025), Aegis BMD, Tranche 2 sats. On March 17, 2026, Gen. Guetlein revealed LMT, RTX, and NOC have formally joined a nine-company C2 consortium — described as Golden Dome\'s \'secret sauce\' — that briefs Guetlein every Thursday evening and can vote out underperforming members.","Lockheed Martin是嵌入最深的主承商。主導C2BMC國家團隊。<b>CEO Taiclet</b>（Q3 2025）：建造「完整運作原型，將上太空」，目標2028年在軌演示。Pound（2025年8月Huntsville）：探索軌道雷射和機動動能彈。維吉尼亞州創新中心進行Golden Dome C2原型開發。C2架構主要供應商。<b>$16.5</b>億資本支出。NGI主承商（2024年4月擊敗Northrop）。"],contracts:[{name:"SBI Prototype — OTA + Self-funded Demo",value:"Classified OTA (~<b>$9</b>-10M) + IR&D (2028 on-orbit target)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["OTA + Company IR&D","OTA + 公司內部研發"],pop:["Nov 2025 – 2028 (on-orbit demo)","2025年11月–2028年（在軌演示）"],desc:["<p>Among 18 firms awarded classified OTA for boost-phase SBI prototypes (Nov 2025). SatNews reported ~<b>$120K</b> initial 'prize' funds for ground demos; true value in future production contracts worth billions annually.</p><ul><li><b>CEO Taiclet</b> (Q3 2025 earnings): 'We are building prototypes, full-up operational prototypes, not things in labs.</li><li>Things that will go into space and can be produced at scale.' Amanda Pound (Aug 5, 2025 Huntsville press briefing): exploring multiple concepts including orbital lasers and satellites converting to kinetic projectiles, targeting on-orbit demonstration by 2028.</li><li>Full-scale SBI flight tests scheduled early 2027 to meet 2028 IOC.</li><li>Lockheed shifting internal R&D allocation toward SBI — <b>CEO described</b> reaching <b>'the mountaintop'</b> in five-year IR&D strategy transformation.</li></ul>","<p>18家獲機密OTA合約的公司之一（2025年11月）。</p><ul><li><b>CEO Taiclet</b>（Q3 2025）：「建造完整運作原型，將上太空，可量產。</li><li>」Pound（2025年8月）：探索軌道雷射和機動動能彈，目標2028年在軌演示。</li><li>SBI飛行測試定於2027年初。</li><li>Lockheed正轉移研發重心至SBI。</li></ul>"]},{name:"Golden Dome C2 Architecture (Prime Vendor)",value:"Classified",agency:["Golden Dome Office (DRPM Guetlein)","Golden Dome辦公室（Guetlein將軍）"],type:["Classified (9-firm C2 consortium)","機密（九企業C2財團）"],pop:["Ongoing – Summer 2028 IOC","進行中–2028年夏IOC"],desc:["<p>Named prime vendor for Golden Dome C2 architecture.</p><ul><li>Leads MDA's C2BMC National Team — 'world's most powerful missile defense software network' connecting forces 24/7.</li><li>Opened Center for Innovation in Virginia for collaborative Golden Dome C2 development.</li><li>Open systems architecture already fusing C2 capabilities <b>'from seabed to space,'</b> including other companies' systems.</li><li>This digital backbone role is critical — Golden Dome's effectiveness requires sub-second integration of orbital sensors, ground interceptors, and AI battle management.</li></ul>","<p>被指定為Golden Dome C2架構主要供應商。</p><ul><li>主導C2BMC國家團隊。</li><li>在維吉尼亞州開設創新中心進行C2原型開發。</li><li>開放系統架構融合「從海底到太空」的C2能力。</li><li>數位骨幹角色至關重要。</li></ul>"]},{name:"THAAD / Aegis / NGI / PAC-3 / LRDR",value:"Multi-billion (NDAA FY2026 fully funded)",agency:["MDA / U.S. Army / U.S. Navy","MDA/美國陸軍/海軍"],type:["Multiple (FFP & Cost-Plus)","多種（FFP及成本加成）"],pop:["Ongoing (multi-decade programs)","進行中（跨數十年計劃）"],desc:["<p>Core fielded systems forming Golden Dome's ground/terminal layers. NDAA FY2026 authorized full THAAD and SM-3 IIA funding.</p><ul><li>PAC-3 MSE and THAAD battle-proven including Operation Epic Fury (Feb 2026).</li><li>NGI prime (beat Northrop, Apr 2024) — first-line-of-defense interceptor within GMD.</li><li>LRDR in Alaska tracked first ICBM-representative target (Jun 2025) — prerequisite for Golden Dome's integrated detection chain.</li><li>SBIRS provides IR missile warning.</li><li>CEO: 'rapidly increasing production capacity across missiles, sensors, battle management, satellite integration.'</li></ul>","<p>核心系統構成Golden Dome地面/末端層。</p><ul><li>FY2026 NDAA全額資助THAAD和SM-3。</li><li>PAC-3和THAAD在Epic Fury行動（2026年2月）中實戰驗證。</li><li>NGI主承商。</li><li>LRDR 2025年6月首次追蹤ICBM級目標。</li></ul>"]}],partners:["Northrop Grumman","RTX","Boeing","MDA (C2BMC)"],mkt:"public",rev:["~$71B (FY2025)","~$710億（FY2025）"],gdVal:["~$2-5B potential (SBI + C2 + NGI/THAAD expansion)","~$20-50億潛在（SBI+C2+NGI/THAAD擴展）"],exp:"low",invNote:["As the largest defense prime, Golden Dome is strategically important but financially incremental (~3-7% of revenue). LMT is a 'steady compounder' — Golden Dome de-risks the long-term backlog but won't drive near-term EPS surprises.","作為最大國防承包商，Golden Dome戰略重要但財務上屬增量（~3-7%營收）。LMT是「穩健複利」標的——Golden Dome降低長期積壓風險但不會驅動近期EPS驚喜。"]},
{name:"Northrop Grumman",ticker:"NYSE: NOC",cat:"prime",tags:[{label:["Defense Prime","國防主承商"],color:"blue"},{label:["SBI Ground Testing","太空攔截器地面測試"],color:"cyan"},{label:["IBCS / 150 Sats","IBCS/150衛星"],color:"emerald"},{label:["C2 Consortium (9-firm)","C2財團(九企業)"],color:"pink"}],summary:["Actively ground-testing SBIs (<b>CEO Warden</b>, Jul 2025); SDI-era SBI prime heritage; 150-sat SDA commitment; IBCS/G/ATOR/Triton for Golden Dome; Starshield partner; ICBM target redesign first flight Jan 8 2026.","正在地面測試太空攔截器（<b>CEO Warden</b> 2025年7月）；SDI時代SBI主承商歷史；150顆SDA衛星；IBCS/G/ATOR/Triton支持Golden Dome；ICBM靶彈改型2026年1月8日首飛。"],role:["Northrop has the deepest SBI heritage — prime contractor for SDI's SBI component in the 1980s. <b>CEO Warden</b> (Q3 2025 earnings): 'Space-based interceptors, which we're testing now... ground-based tests today.' Raymond Sharp (Golden Dome Enterprise Lead): SBI technology 'light-years ahead' of Brilliant Pebbles era. Positioned IBCS, G/ATOR (AN/TPS-80), Triton (MQ-4C), plus restricted programs for Golden Dome. Committed to 150 SDA satellites. <b>$1.65B</b> FY2026 capex for Space Park. ICBM target redesign first flight Jan 8, 2026 — critical for testing interceptors. Starshield manufacturing partner with SpaceX.","Northrop擁有最深SBI歷史——SDI SBI主承商。<b>CEO Warden</b>（Q3 2025）：「太空攔截器，正在測試。」Sharp（Golden Dome企業負責人）：技術比Brilliant Pebbles「超前光年」。定位IBCS、G/ATOR、Triton。150顆SDA衛星。<b>$16.5</b>億資本支出。ICBM靶彈2026年1月8日首飛。Starshield合作。"],contracts:[{name:"SBI Prototype — OTA + Ground Testing",value:"~<b>$9</b>-10M (classified OTA, Nov 2025)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["OTA + Company IR&D","OTA + 公司內部研發"],pop:["Nov 2025 – TBD (ground testing)","2025年11月–待定（地面測試中）"],desc:["<p>Among 18 firms awarded classified OTA (Nov 2025). Unique heritage: prime contractor for SDI's SBI component (1980s Brilliant Pebbles).</p><ul><li><b>CEO Warden</b> (Jul 2025): 'Space-based interceptors, which we're testing now... these are ground-based tests today, and we are in competition.' Raymond Sharp (Golden Dome Enterprise Lead): 'Processing speed is significantly more advanced, faster than it was in the 1980s...</li><li>SBIs are a lot more achievable and realistic now.' Already providing operational analysis to Pentagon on SBI concepts.</li><li><b>Michelle Mathieson (SBI Lead)</b>: SBIs would be 'the first to see, engage and intercept the threat' — the 'first up<b>' in America'</b>s missile defense, engaging with less time and energy than ground-based systems.</li><li>Warden declined to detail kill mechanism but confirmed it can be 'accelerated into the time frame the administration is looking for.'</li></ul>","<p>18家獲機密OTA合約的公司之一（2025年11月）。</p><ul><li>獨特歷史：SDI SBI主承商。</li><li><b>CEO Warden</b>（2025年7月）：「太空攔截器，正在地面測試。</li><li>」Sharp：「處理速度比1980年代顯著提升。</li><li>」Mathieson（SBI負責人）：太空攔截器將是「第一個發現、交戰和攔截威脅的」——以更少時間和能量比地面系統交戰。</li></ul>"]},{name:"SDA 150-Satellite Commitment",value:"Multi-billion (across tranches)",agency:["Space Development Agency (SDA)","太空發展局（SDA）"],type:["Firm-Fixed-Price OTA (across tranches)","FFP OTA（跨多批次）"],pop:["2022 – FY2029+ (spiral development)","2022–FY2029+（螺旋開發）"],desc:["<p>150 satellites across SDA tranches for PWSA tracking and transport layers.</p><ul><li><b>$1.65B</b> FY2026 capex for Space Park to handle rapid production.</li><li>Represents fundamental shift toward high-volume orbital hardware manufacturing for the defense industrial base.</li></ul>","<p>跨SDA批次為PWSA製造150顆衛星。</p><ul><li><b>$16.5億</b>資本支出擴建Space Park。</li></ul>"]},{name:"IBCS / G/ATOR / Triton + Restricted Programs",value:"Multi-billion (ongoing)",agency:["U.S. Army / USMC / Navy","美國陸軍/陸戰隊/海軍"],type:["Multiple (program-dependent)","多種"],pop:["Ongoing (fielded systems)","進行中（已部署系統）"],desc:["<p><b>CEO Warden</b> specifically named: IBCS (Integrated Battle Command System) — connects sensors and shooters across domains; G/ATOR (AN/TPS-80) — ground/air task-oriented radar; Triton (MQ-4C) — unmanned maritime surveillance; plus restricted portfolio programs.</p><ul><li>IBCS is critical — the Army selected Anduril's Lattice for the IBCS-M variant, creating competitive dynamics.</li><li>These form Golden Dome's near-term operational backbone.</li><li>Redesigned ICBM target vehicle first flight Jan 8, 2026 (Robin Heard, Director Targets & Interceptors confirmed <b>'all performance goals met'</b>) — supports NGI testing and Golden Dome interceptor validation.</li></ul>","<p><b>CEO Warden點名</b>：IBCS、G/ATOR雷達、Triton無人機及限制計劃。</p><ul><li>IBCS連接跨域感測器和武器。</li><li>改型ICBM靶彈2026年1月8日首飛成功——支持攔截器測試驗證。</li></ul>"]}],partners:["SpaceX (Starshield)","Lockheed Martin","L3Harris","MDA"],mkt:"public",rev:["~$41B (FY2025)","~$410億（FY2025）"],gdVal:["~$3-5B+ (150 SDA sats + SBI + IBCS + C2 consortium)","~$30-50億+（150 SDA衛星+SBI+IBCS+C2財團）"],exp:"med",invNote:["Higher GD exposure than LMT due to 150-satellite SDA commitment and SBI heritage. Space segment (~25% of revenue) is the primary beneficiary. The C2 consortium role adds recurring revenue potential.","比LMT有更高GD曝險度（150顆SDA衛星承諾和SBI歷史）。太空部門（~25%營收）為主要受益者。C2財團角色增加經常性收入潛力。"]},
{name:"RTX Corporation (Raytheon)",ticker:"NYSE: RTX",cat:"prime",tags:[{label:["Defense Prime","國防主承商"],color:"blue"},{label:["Kinetic Interceptors","動能攔截器"],color:"red"},{label:["Patriot/SM-3/GPI","愛國者/SM-3/GPI"],color:"emerald"},{label:["C2 Consortium (9-firm)","C2財團(九企業)"],color:"pink"}],summary:["Kinetic interceptor lead for ground layer; Patriot/SM-3 fully funded (NDAA FY2026); Army quadrupling Patriot procurement; <b>$2.01B</b> USAF mod; <b>$1.7B</b> Spain Patriot; David's Sling (Rafael); GPI for hypersonic.","地面層動能攔截器主導者；愛國者/SM-3全額資助；陸軍愛國者採購量翻四倍；<b>$20.1</b>億空軍修約；<b>$17</b>億西班牙愛國者；David's Sling；GPI高超音速。"],role:["Raytheon dominates Golden Dome's ground kinetic interception layer. Patriot, SM-3 Block IIA, and Glide Phase Interceptor (GPI) for hypersonic threats as cornerstones. Army plans to quadruple Patriot procurement (Defense One Jul 2025). Strong international pipeline: <b>$1.7B</b> Spain, plus Germany, Netherlands, Romania. David's Sling with Rafael. <b>$2.01B</b> USAF modification.","Raytheon主導Golden Dome地面動能攔截層。愛國者、SM-3 Block IIA和GPI為基石。陸軍計劃將愛國者採購量翻四倍。<b>$17</b>億西班牙合約。David's Sling。<b>$20.1</b>億空軍修約。"],contracts:[{name:"Patriot / SM-3 / GPI (Ongoing)",value:"Multi-billion (NDAA FY2026 fully funded)",agency:["U.S. Army / U.S. Navy / MDA","美國陸軍/海軍/MDA"],type:["Multiple (FFP production + CPFF dev)","多種（FFP生產+CPFF開發）"],pop:["Ongoing (NDAA FY2026 funded)","進行中（FY2026全額資助）"],desc:["<p>NDAA FY2026 authorized full funding. Army quadrupling Patriot missile procurement (Defense One, Jul 2025).</p><ul><li>SM-3 Block IIA provides sea-based BMD via Aegis ships — proven in real-world intercepts.</li><li>GPI addresses hypersonic glide vehicles in glide phase.</li><li><b>$1.7B</b> for four Patriot systems to Spain.</li><li>Patriot combat-proven in Operation Epic Fury (Feb 2026).</li><li>These ground/terminal systems form the layer that space-based sensors and interceptors will cue.</li></ul>","<p>FY2026 NDAA全額資助。陸軍愛國者採購量翻四倍。</p><ul><li>SM-3 Block IIA海基彈道導彈防禦。</li><li>GPI攔截高超音速滑翔載具。</li><li><b>$17億</b>西班牙合約。</li><li>愛國者在Epic Fury行動中實戰驗證。</li></ul>"]},{name:"USAF Contract Modification",value:"<b>$2.01B</b>",agency:["U.S. Air Force","美國空軍"],type:["Cost-Plus-Fixed-Fee (CPFF)","成本加固定費用（CPFF）"],pop:["Ongoing (multi-year sustainment)","進行中（多年維護）"],desc:["<p>Raytheon secured <b>$2.01B</b> USAF contract modification extending missile defense radar and interceptor support.</p><ul><li>Backbone of CONUS air defense that Golden Dome integrates and augments.</li></ul>","<p>Raytheon獲<b>$20.1</b>億空軍合約修訂，擴展導彈防禦雷達和攔截器支持工作。</p><ul><li>延續美國本土（CONUS）防空骨幹系統的運營和維護支持。</li><li>Golden Dome 將整合並強化（而非替換）這些已部署的現有雷達和攔截器系統。</li><li>涵蓋雷達維護、攔截器後勤保障及系統升級工作，確保地面防禦層在太空組件開發期間持續運作。</li></ul>"]},{name:"SHIELD IDIQ (Phase 2)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Qualified Dec 18, 2025.</p><ul><li>Pursues kinetic interceptor, directed energy, ground defense task orders.</li><li>RTX's breadth across radar, interceptors, EW makes it a candidate for multiple Golden Dome layers.</li></ul>","<p>2025年12月18日取得資格。</p><ul><li>RTX在雷達、攔截器和電子戰方面的廣度適合多個Golden Dome層面。</li></ul>"]}],partners:["Lockheed Martin (THAAD)","Rafael (David's Sling)","U.S. Army"],mkt:"public",rev:["~$79B (FY2025)","~$790億（FY2025）"],gdVal:["Multi-billion (Patriot/SM-3 production ramp + C2 consortium)","數十億（愛國者/SM-3產能爬坡+C2財團）"],exp:"low",invNote:["Golden Dome primarily extends existing Patriot/SM-3 production lines rather than creating new revenue streams. The Army's plan to quadruple Patriot procurement is the key catalyst, but this was likely happening regardless of Golden Dome branding. C2 consortium is additive.","Golden Dome主要延續現有愛國者/SM-3產線而非創建新營收。陸軍愛國者採購量翻四倍是關鍵催化劑，但此趨勢可能不依賴Golden Dome品牌。C2財團為增量。"]},
{name:"Anduril Industries",ticker:"Private (~<b>$28B</b> val.)",cat:"tech",tags:[{label:["Defense Tech","國防科技"],color:"purple"},{label:["SBI Prototype","太空攔截器原型"],color:"cyan"},{label:["Lattice OS / IBCS-M","Lattice/IBCS-M"],color:"orange"}],summary:["SBI prototype; SpaceX/Palantir consortium (400-1,000 tracking + 200 attack sats); Lattice selected for Army IBCS-M; <b>$100M</b> CDAO edge AI; Anduril-Palantir AI consortium (Dec 2024); Apex Space bus supply partnership.","太空攔截器原型；SpaceX/Palantir聯盟（400-1,000追蹤+200攻擊衛星）；Lattice獲選陸軍IBCS-M；<b>$1</b>億CDAO邊緣AI；Anduril-Palantir AI聯盟；Apex Space合作。"],role:["Leading defense tech disruptor positioned across multiple Golden Dome layers. SpaceX-Palantir-Anduril consortium for custody layer (Reuters Apr 2025): 400-1,000 tracking + ~200 attack sats. Lattice OS integrates with 'several dozen distinct military systems' (F-35, multiple radars, acoustic/EO sensors, IBCS). Army selected Lattice for IBCS-M fire control (2025). <b>$100M</b> CDAO OTA for edge data integration. Dec 2024: formalized Anduril-Palantir consortium combining Lattice (edge) + Maven/AIP (enterprise). Expanding to include OpenAI (counter-drone), Scale AI, Saronic. Classified OTA for SBI prototypes. Apex Space partnership for satellite buses. Arsenal-1 advanced manufacturing.","領先國防科技顛覆者，橫跨多個Golden Dome層。SpaceX-Palantir-Anduril監測層聯盟。Lattice OS整合「數十種軍事系統」。陸軍選擇Lattice用於IBCS-M。<b>$1</b>億CDAO邊緣AI合約。2024年12月成立聯盟。與Apex Space合作。"],contracts:[{name:"SBI Prototype — OTA",value:"~<b>$9</b>-10M (classified, Nov 2025)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["OTA","OTA"],pop:["Nov 2025 – TBD","2025年11月–待定"],desc:["<p>Among 18 firms awarded classified OTA for boost-phase SBI prototypes.</p><ul><li>Anduril's software-defined, commercially developed approach aligns with administration's push for COTS solutions.</li><li>Lattice OS could provide interceptor autonomy and engagement management.</li><li>Competes with Lockheed, Northrop, True Anomaly.</li></ul>","<p>18家獲機密OTA合約的公司之一。</p><ul><li>Anduril軟體定義方法符合政府推動COTS的方向。</li><li>Lattice OS可提供攔截器自主和交戰管理。</li></ul>"]},{name:"SpaceX-Palantir-Anduril Consortium",value:"TBD (est. multi-billion)",agency:["DoD / Golden Dome Office (bid stage)","國防部（競標階段）"],type:["TBD (consortium proposal)","待定（聯盟提案）"],pop:["TBD","待定"],desc:["<p>Reuters (Apr 2025): six sources confirmed the three companies met with top officials.</p><ul><li>Proposal: 400-1,000 tracking satellites + ~200 attack satellites with interceptors/lasers.</li><li>Anduril contributes Lattice OS (autonomous C2), Menace C4 platforms, autonomous defense systems.</li><li>Dec 2024: formalized consortium with Palantir combining Lattice (edge) + Maven/AIP (enterprise) — 'a deployment platform for new AI applications that anyone can build.' Expanding to OpenAI, Scale AI, Saronic per FT reporting.</li><li>Pitched subscription model.</li></ul>","<p>路透社（2025年4月）：六位消息人士確認與高官會面。</p><ul><li>提案：400-1,000追蹤衛星+~200攻擊衛星。</li><li>Anduril貢獻Lattice OS、Menace C4平台。</li><li>2024年12月與Palantir正式化聯盟。</li><li>擴展至OpenAI、Scale AI等。</li></ul>"]},{name:"Army IBCS-M / Lattice Selection + <b>$100M</b> CDAO",value:"Classified (IBCS-M) + <b>$100M</b> (CDAO)",agency:["U.S. Army (IBCS-M) / CDAO (edge AI)","美國陸軍/CDAO"],type:["OTA (IBCS-M + CDAO $100M)","OTA"],pop:["2025 – ongoing","2025–進行中"],desc:["<p>Army selected Lattice as IBCS-M fire control platform (2025) — single operator manages multiple UAS threats via fused sensor data, automated fire control. Yuma Proving Ground live-fire: integrated new sensor/effector within hours, successful engagements. 4th Infantry Division Ivy Sting exercises (1-6+) every ~6 weeks.</p><ul><li>Ivy Sting 4 (Feb 2026) largest — logistics integration, EW jamming.</li><li><b>Ivy Mass (~May 2026)</b> full-division event.</li><li>Separately, <b>$100M</b> CDAO OTA for edge data integration.</li><li>Positions Lattice as potential Golden Dome ground-layer C2.</li></ul>","<p>陸軍選擇Lattice為IBCS-M火控平台（2025）。</p><ul><li>Yuma實彈演習：數小時內整合新感測器。</li><li>第四步兵師Ivy Sting演習。</li><li>Ivy Mass（~2026年5月）師級演習。</li><li>另獲<b>$1億</b>CDAO OTA邊緣數據整合。</li></ul>"]}],partners:["SpaceX","Palantir","Apex Space","OpenAI"],mkt:"private",rev:["~$1-2B (2025E, private, ~$28B valuation)","~$10-20億（2025估計，未上市，~$280億估值）"],gdVal:["TBD — consortium bid + SBI + IBCS-M (potentially multi-billion)","待定——聯盟競標+SBI+IBCS-M（潛在數十億）"],exp:"vhigh",invNote:["Private company — not directly investable in public markets. Reportedly planning IPO potentially in 2026 (per some reports, a merger/IPO could reach ~$1.5T combined entity with SpaceX). Golden Dome is a transformative catalyst for Anduril's valuation trajectory. Watch for IPO timing.","未上市——公開市場無法直接投資。據報可能2026年IPO。Golden Dome是Anduril估值軌跡的變革性催化劑。關注IPO時點。"]},
{name:"Palantir Technologies",ticker:"NYSE: PLTR",cat:"tech",tags:[{label:["AI / Data Analytics","AI/數據分析"],color:"purple"},{label:["Maven <b>$1.3B</b>","Maven <b>$13</b>億"],color:"amber"},{label:["Consortium","聯盟"],color:"pink"}],summary:["AI/ML battle management backbone; Maven expanded to <b>$1.3B</b> (May 2025); SpaceX/Anduril consortium; Gotham/AIP across DoD combatant commands; MetaConstellation space AI; CJADC2 embedded.","AI/ML戰鬥管理骨幹；Maven擴至<b>$13</b>億；SpaceX/Anduril聯盟；Gotham/AIP部署各作戰司令部；MetaConstellation太空AI；嵌入CJADC2。"],role:["Palantir is Golden Dome's AI and data analytics backbone. Maven Smart System (MSS) expanded <b>$795M</b> (May 2025) to <b>$1.3B</b> through 2029, driven by CENTCOM/EUCOM/PACOM demand. MSS embedded in CJADC2 initiative. For Golden Dome: data fusion turning raw sensor feeds from AMTI, Starshield, SDA tracking, ground radars into weapons-quality targeting tracks. MetaConstellation provides space AI (reportedly leveraged by Israel for Iron Dome accuracy). Dec 2024: formalized consortium with Anduril combining Maven/AIP (enterprise) + Lattice (edge). Army data platform since 2017.","Palantir是Golden Dome AI骨幹。Maven 2025年5月擴展<b>$7.95</b>億至<b>$13</b>億。嵌入CJADC2。為Golden Dome將原始感測器數據轉化為武器級瞄準追蹤。MetaConstellation太空AI。2024年12月與Anduril成立聯盟。"],contracts:[{name:"Maven Smart System (MSS)",value:"<b>$1.3B</b> total (expanded <b>$795M</b>, May 2025)",agency:["Chief Digital & AI Office (CDAO)","CDAO"],type:["IDIQ (expanded $795M, May 2025)","IDIQ（2025年5月擴展$7.95億）"],pop:["Expanded May 2025 – 2029","2025年5月擴展–2029年"],desc:["<p>Pentagon expanded Maven by <b>$795M</b> (May 2025) to <b>$1.3B</b> through 2029.</p><ul><li>Computer vision and AI analytics for object detection, ISR analysis, battlespace awareness.</li><li>Deployed across CENTCOM, EUCOM, PACOM, NORTHCOM/NORAD, TRANSCOM.</li><li>For Golden Dome: processes orbital sensor data flows — fusing AMTI radar tracks, Starshield IR detections, SDA tracking data into unified targeting picture.</li><li>MSS embedded in CJADC2 initiative.</li></ul>","<p>五角大樓2025年5月擴展Maven <b>$7.95</b>億至<b>$13</b>億（至2029年）。</p><ul><li>計算機視覺和AI分析。</li><li>部署於各作戰司令部。</li><li>為Golden Dome處理軌道感測器數據流——融合AMTI雷達追蹤、Starshield紅外偵測、SDA追蹤數據。</li><li>嵌入CJADC2。</li></ul>"]},{name:"Consortium Bid (SpaceX-Palantir-Anduril)",value:"TBD (est. multi-billion)",agency:["DoD / Golden Dome Office (bid stage)","國防部（競標階段）"],type:["TBD (not yet awarded)","待定（尚未授標）"],pop:["TBD","待定"],desc:["<p>Provides AI analytics, sensor data fusion, and battle management for custody/tracking layer.</p><ul><li>Turns raw feeds from 400-1,000 constellation satellites into actionable targeting with sub-second latency.</li><li>MetaConstellation for space AI orchestration.</li><li>AIP for cloud data management across classification levels.</li></ul>","<p>為監測/追蹤層提供AI分析、感測器融合和戰鬥管理。</p><ul><li>將400-1,000顆衛星原始數據轉化為亞秒延遲的可操作瞄準。</li><li>MetaConstellation太空AI。</li><li>AIP跨密級雲端管理。</li></ul>"]},{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Qualified for AI/ML, C2, data integration task orders.</p><ul><li>Embedded across DoD since 2017 (Army data platform, Maven, Gotham in IC).</li><li>Structural advantage for Golden Dome AI work.</li></ul>","<p>AI/ML、C2、數據整合任務訂單。</p><ul><li>2017年起嵌入國防部。</li><li>Golden Dome AI工作的結構性優勢。</li></ul>"]}],partners:["SpaceX","Anduril","OpenAI","Scale AI"],mkt:"public",rev:["~$2.9B (FY2025)","~$29億（FY2025）"],gdVal:["Maven $1.3B (through 2029) + consortium TBD","Maven $13億（至2029年）+聯盟待定"],exp:"high",invNote:["Golden Dome's AI/ML requirements align perfectly with Palantir's core competency. Maven's $1.3B represents ~45% of annual revenue — highly material. If the SpaceX-Palantir-Anduril consortium wins the custody layer, the upside is transformational. However, PLTR trades at >60x forward revenue — Golden Dome optimism may already be heavily priced in.","Golden Dome的AI/ML需求完美契合Palantir核心能力。Maven $13億佔~45%年營收——高度重要。但PLTR以>60倍前瞻營收交易——Golden Dome樂觀預期可能已大幅計入股價。"]},
{name:"L3Harris Technologies",ticker:"NYSE: LHX",cat:"satellite",tags:[{label:["All SDA Tranches (T0-T3)","全部SDA批次"],color:"emerald"},{label:["<b>$125M</b> Expansion","<b>$1.25</b>億擴建"],color:"blue"},{label:["><b>$2B</b> Cumulative","><b>$20</b>億累計"],color:"amber"}],summary:["Only firm in every SDA tracking tranche (T0-T3); ><b>$2B</b> cumulative; full-rate production Dec 2025 Palm Bay (Ed Zoiss confirmed); <b>$125M</b> Fort Wayne expansion; sensors on other primes' satellites.","唯一入選所有SDA追蹤層批次；累計><b>$20</b>億；2025年12月Palm Bay全速生產（Zoiss確認）；<b>$1.25</b>億Fort Wayne擴建；感測器裝載於其他主承商衛星。"],role:["Anchor vendor for Golden Dome's tracking layer — only company in every SDA tranche T0-T3. ><b>$2B</b> cumulative contracts. Ed Zoiss (President Space & Airborne Systems) confirmed 'full-rate production' at Palm Bay, FL (Dec 2025): 'No ifs, ands, or buts.' Palm Bay expanded Aug 2025 for SDA/Golden Dome. <b>$125M</b> Fort Wayne IR payload expansion. Developing sensors maintaining 'custody' of high-speed targets across orbital planes. Sensors also merchant-supplied to other TRKT3 primes (including Rocket Lab StarLite adoption).","Golden Dome追蹤層核心供應商——唯一入選T0-T3所有批次。累計><b>$20</b>億。Zoiss（2025年12月）：「全速生產，毫無疑問。」Palm Bay 2025年8月擴建。<b>$1.25</b>億Fort Wayne擴建。感測器也供應其他主承商。"],contracts:[{name:"SDA Tracking Layer (All Tranches T0-T3)",value:"><b>$2B</b> cumulative",agency:["Space Development Agency (SDA)","太空發展局（SDA）"],type:["Firm-Fixed-Price OTA (all tranches)","FFP OTA（所有批次）"],pop:["2022 – FY2029 (T3 launch)","2022–FY2029（T3發射）"],desc:["<p>Only company awarded every SDA tracking tranche. T3 part of <b>$3.5B</b> batch (Dec 2025, 72 sats across 4 vendors).</p><ul><li>SDA acting director Sandhoo: T3 achieves 'near-continuous global coverage for missile warning and tracking, with fire control-quality tracks.' FY2029 launch.</li><li>Ed Zoiss confirmed full-rate production at Palm Bay.</li><li>Production floor expanded Aug 2025 for increased demand.</li><li>Bloomberg: awards are 'significant investment in capabilities seen as part of Golden Dome.'</li></ul>","<p>唯一入選所有SDA追蹤層批次。</p><ul><li>T3屬於<b>$35億</b>批次（2025年12月，72顆衛星，4家供應商）。</li><li>SDA代理主任Sandhoo：T3實現「近乎連續全球覆蓋和火控級追蹤」。</li><li>2025年8月擴建產線。</li><li>Bloomberg：「Golden Dome相關能力的重大投資」。</li></ul>"]},{name:"Fort Wayne IR Payload Expansion",value:"<b>$125M</b> investment",agency:["L3Harris (company capex)","L3Harris（公司資本支出）"],type:["Internal investment","內部投資"],pop:["2025 – ongoing","2025–進行中"],desc:["<p><b>$125M</b> expansion at Fort Wayne, IN for IR sensing payload production — central technology for Golden Dome's tracking layer detecting missile heat signatures across flight phases.</p><ul><li>Complements Palm Bay satellite assembly.</li></ul>","<p><b>$1.25</b>億Fort Wayne擴建紅外感測載荷產能。</p><ul><li>Golden Dome追蹤層核心技術。</li></ul>"]},{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Positioned for digital engineering, next-gen OPIR sensor trials, tracking algorithms, C2 fusion.</p><ul><li>Consistent selection across every tranche gives institutional knowledge advantage.</li></ul>","<p>數位工程、OPIR感測器、追蹤算法、C2融合。</p><ul><li>跨所有批次的持續入選賦予制度知識優勢。</li></ul>"]}],partners:["SDA","Northrop Grumman","Rocket Lab (StarLite)"],mkt:"public",rev:["~$21B (FY2025)","~$210億（FY2025）"],gdVal:[">$2B cumulative SDA + $125M capex + T3 share","累計>$20億SDA + $1.25億資本支出 + T3份額"],exp:"med",invNote:["Consistent execution across every SDA tranche makes L3Harris the most 'bankable' Golden Dome tracking layer play. GD contracts represent ~10%+ of revenue. Full-rate production achieved. The risk is low given proven track record, but upside is capped versus higher-growth names.","跨所有SDA批次的穩定執行使L3Harris成為最「可靠」的Golden Dome追蹤層標的。GD合約佔~10%+營收。已達全速生產。風險低但上行空間受限。"]},
{name:"Rocket Lab",ticker:"Nasdaq: RKLB",cat:"newspace",tags:[{label:["Satellite Manufacturer","衛星製造商"],color:"cyan"},{label:["HASTE Launch","HASTE發射"],color:"blue"},{label:["<b>$1.5B+</b> Backlog","<b>$15</b>億+積壓"],color:"emerald"}],summary:["<b>$816M</b> SDA T3 + <b>$515M</b> Transport + <b>$190M</b> HASTE (20 launches, Mar 18 2026) = <b>$1.5B+</b>; only commercial provider building sats & payloads in-house for SDA; 70+ launches backlog; total backlog ><b>$2B</b>.","<b>$8.16</b>億T3+<b>$5.15</b>億傳輸+<b>$1.9</b>億HASTE(20次發射)=<b>$15</b>億+；唯一為SDA自主製造衛星與載荷；70+發射積壓；總積壓><b>$20</b>億。"],role:["Disrupting legacy primes via vertical integration. Only commercial provider producing both spacecraft and payloads in-house for SDA Tracking Layer. Phoenix IR sensor and StarLite protection sensors adopted by other TRKT3 primes. <b>CEO Sir</b> Peter Beck: 'Rocket Lab's vertically integrated approach is enabling a fundamental shift in how national security space programs are executed.' 21 launches in 2025 (record). 28 new launches sold in Q1 2026 alone. 70+ backlog. ><b>$2B</b> total backlog. CDR phase for T2TL — first flight units to Vandenberg SFB mid-2027.","通過垂直整合顛覆傳統主承商。唯一為SDA追蹤層自主製造衛星與載荷。Phoenix和StarLite感測器被其他主承商採用。<b>CEO Beck</b>：「正在實現國安太空計劃執行的根本轉變。」2025年21次發射。Q1 2026售出28次。70+積壓。總積壓><b>$20</b>億。"],contracts:[{name:"SDA Tracking Layer Tranche 3 (TRKT3)",value:"<b>$816M</b> (<b>$806M</b> + <b>$10.45M</b> options)",agency:["Space Development Agency (SDA)","太空發展局（SDA）"],type:["Firm-Fixed-Price OTA","FFP OTA"],pop:["Dec 2025 – FY2029 (3-yr production → launch)","2025年12月–FY2029（3年生產→發射）"],desc:["<p>Awarded Dec 19, 2025. Largest single contract. 18 satellites with Phoenix IR (WFOV) and StarLite protection sensors.</p><ul><li>StarLite also adopted by other TRKT3 primes — additional ~<b>$184M</b> subsystem supply could push total capture to ~<b>$1B</b> (payloads, solar, ADAC, software).</li><li>SDA acting director Sandhoo: T3 achieves 'near-continuous global coverage.' Part of <b>$3.5B</b> across 4 companies for 72 sats.</li><li>FY2029 launch.</li><li>Bloomberg: 'significant investment as part of Golden Dome.'</li></ul>","<p>2025年12月19日授標。</p><ul><li>最大單一合約。</li><li>18顆衛星搭載Phoenix紅外和StarLite感測器。</li><li>StarLite被其他主承商採用——額外~<b>$1.84億</b>子系統供應，總捕獲潛在~<b>$10億</b>。</li><li>Bloomberg：「Golden Dome相關重大投資。</li></ul>"]},{name:"SDA Transport Layer-Beta Tranche 2",value:"<b>$515M</b>",agency:["Space Development Agency (SDA)","太空發展局（SDA）"],type:["Firm-Fixed-Price OTA","FFP OTA"],pop:["Jan 2024 – mid-2027 (CDR → delivery)","2024年1月–2027年中（CDR→交付）"],desc:["<p>18 satellites for secure low-latency encrypted comms across PWSA — the data backbone connecting tracking sats to ground fire control.</p><ul><li>Uses Lightning platform.</li><li>CDR phase; hardware qualification late 2026; first flight units to Vandenberg SFB mid-2027.</li><li><b>Combined</b> SDA total ><b>$1.3B</b>.</li></ul>","<p>18顆衛星為PWSA提供安全低延遲加密通訊。</p><ul><li>使用Lightning平台。</li><li>處於CDR階段。</li><li>合計SDA><b>$13億</b>。</li></ul>"]},{name:"HASTE — MACH-TB 2.0 (20 Launches)",value:"<b>$190M</b> (announced Mar 18, 2026)",agency:["TRMC / NSWC Crane (via Kratos prime)","TRMC/NSWC Crane（經Kratos主承商）"],type:["Subcontract under OTA (MACH-TB 2.0 TA1)","OTA下分包合約"],pop:["Mar 2026 – 2030 (4 yrs, 20 launches)","2026年3月–2030年（4年，20次發射）"],desc:["<p>Announced today (March 18, 2026). Single largest launch contract in Rocket Lab history. 20 hypersonic test flights over 4 years with HASTE (Mach 5+ suborbital Electron variant) under MACH-TB 2.0 Task Area 1, prime contractor Kratos (KTOS).</p><ul><li>Partnership with TRMC/NSWC Crane.</li><li>First mission within months. 100% HASTE success rate since 2023.</li><li>Supports Golden Dome by accelerating hypersonic test cadence for interceptor development.</li><li>Pushes backlog to ><b>$2B</b> and 70+ launches.</li><li><b>CEO Beck</b>: 'Our expanded partnership strengthens America's national security with speed and affordability.' Q1 2026: 28 new launches sold — almost equal to full year 2025.</li></ul>","<p>2026年3月18日公布。Rocket Lab歷史最大發射合約。</p><ul><li>在MACH-TB 2.0下（主承商Kratos）4年20次HASTE高超音速試飛。</li><li>首次任務數月內。</li><li>100%成功率。</li><li>通過加速試飛節奏支持Golden Dome。</li><li>總積壓><b>$20億</b>。</li><li>Q1 2026售出28次新發射。</li></ul>"]}],partners:["SDA","Kratos (MACH-TB 2.0 prime)","L3Harris (StarLite)"],mkt:"public",rev:["~$500M (FY2025E)","~$5億（FY2025估計）"],gdVal:["$1.5B+ funded (SDA $1.33B + HASTE $190M)","$15億+已資助（SDA $13.3億+HASTE $1.9億）"],exp:"vhigh",invNote:["<b>Highest GD 'purity' among public equities.</b> $1.5B+ in funded Golden Dome-related contracts = ~3x annual revenue. Total backlog >$2B. FFP OTA contracts provide earnings visibility. The SDA/HASTE contracts fundamentally transformed RKLB from a launch company into a defense space prime. Key risk: execution on simultaneous satellite production + high launch cadence. Valuation already elevated (~30x+ forward revenue).","<b>上市公司中GD「純度」最高。</b>$15億+已資助GD合約=~3倍年營收。總積壓>$20億。FFP OTA合約提供盈利可見性。SDA/HASTE合約從根本上將RKLB從發射公司轉型為國防太空主承商。風險：同步衛星生產+高頻發射的執行力。估值已偏高（>30倍前瞻營收）。"]},
{name:"Boeing",ticker:"NYSE: BA",cat:"prime",tags:[{label:["Defense Prime","國防主承商"],color:"blue"},{label:["MWT MEO (12 sats)","MWT中軌(12顆)"],color:"cyan"},{label:["X-37B / Foo Fighter","X-37B/Foo Fighter"],color:"amber"}],summary:["12 Resilient MWT MEO satellites via Millennium Space (delivery mid-2027); 'Foo Fighter' dual-spectrum tracking; X-37B orbital testbed; new 9,000 sq ft El Segundo EO/IR line; 26-sat 2026 target.","12顆彈性MWT中軌衛星（Millennium Space，2027年中交付）；Foo Fighter雙頻譜追蹤；X-37B軌道試驗台；新建El Segundo產線；2026年目標26顆。"],role:["Participates via subsidiary Millennium Space Systems — 12 Resilient MWT MEO satellites. New 9,000 sq ft El Segundo production line for dual-spectrum EO/IR payloads. Boeing Space targets 26 satellites in 2026 (2x 2025). X-37B serves as orbital testbed for sensitive Golden Dome tech. 'Foo Fighter' tracking satellites provide persistent detection. Arrow heritage with Israel's IAI.","透過Millennium Space子公司參與——12顆MWT中軌衛星。新建El Segundo產線。2026年目標26顆衛星。X-37B為Golden Dome技術軌道試驗台。與IAI的Arrow合作。"],contracts:[{name:"Resilient MWT MEO Satellites",value:"Classified (12 sats, mid-2027)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["Classified","機密"],pop:["Ongoing – mid-2027 (delivery)","進行中–2027年中（交付）"],desc:["<p>12 MEO satellites via Millennium Space Systems.</p><ul><li>New 9,000 sq ft El Segundo production line (size of two basketball courts) for dual-spectrum detection assembly.</li><li>Delivery mid-2027 after supply chain delays.</li><li>MEO provides broader coverage with fewer sats, complementing LEO SDA tracking layer.</li></ul>","<p>透過Millennium Space製造12顆中軌衛星。</p><ul><li>新建El Segundo產線。</li><li>2027年中交付。</li><li>中軌以較少衛星提供更廣覆蓋，互補低軌SDA追蹤層。</li></ul>"]},{name:"'Foo Fighter' + X-37B",value:"Classified",agency:["U.S. Space Force","太空軍"],type:["Classified","機密"],pop:["Ongoing","進行中"],desc:["<p>Foo Fighter: dual-spectrum EO/IR detection satellites for persistent sensing.</p><ul><li>X-37B: autonomous orbital testbed for classified Golden Dome technologies.</li><li>Boeing pitched X-37B for broader orbital missions beyond testing.</li></ul>","<p>Foo Fighter：雙頻譜偵測衛星。</p><ul><li>X-37B：機密Golden Dome技術的軌道試驗台。</li><li>Boeing推銷X-37B用於更廣泛軌道任務。</li></ul>"]},{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Qualified.</p><ul><li>New El Segundo line commissioned for Golden Dome EO/IR payloads. 26-satellite 2026 target demonstrates production scaling.</li></ul>","<p>已取得資格。</p><ul><li>新El Segundo產線專供Golden Dome載荷。</li><li>2026年目標26顆展示產能擴展。</li></ul>"]}],partners:["IAI (Arrow)","Millennium Space (subsidiary)"],mkt:"public",rev:["~$66B (FY2025)","~$660億（FY2025）"],gdVal:["Classified (12 MWT sats + Foo Fighter + X-37B)","機密（12顆MWT+Foo Fighter+X-37B）"],exp:"low",invNote:["Golden Dome is a small fraction of Boeing's defense segment (~$25B). The company's commercial aviation challenges dominate the investment narrative. GD provides a positive data point for the space/defense portfolio but is not a primary catalyst.","Golden Dome僅佔Boeing國防部門（~$250億）的小部分。商用航空挑戰主導投資敘事。GD為太空/國防組合提供正面數據但非主要催化劑。"]},
{name:"BAE Systems",ticker:"LON: BA./OTC: BAESY",cat:"satellite",tags:[{label:["Epoch 2 Prime","Epoch 2主承商"],color:"blue"},{label:["<b>$1.2B</b> Award","<b>$12</b>億"],color:"amber"},{label:["MWT Satellites","MWT衛星"],color:"emerald"}],summary:["Epoch 2 prime — <b>$1.2B</b> for 10 additional MWT satellites (Jun 2025); complements Boeing MWT MEO and L3Harris SDA tracking for multi-orbit sensor mesh.","Epoch 2主承商——<b>$12</b>億10顆MWT衛星（2025年6月）；與Boeing MWT和L3Harris SDA追蹤層互補形成多軌道感測器網。"],role:["Prime for Space Force Epoch 2 missile warning program. <b>$1.2B</b> for 10 additional satellites advancing the multi-orbit sensor architecture feeding Golden Dome's kill chain.","太空軍Epoch 2導彈預警計劃主承商。<b>$12</b>億10顆衛星。推進多軌道感測器架構。"],contracts:[{name:"Epoch 2 MWT Satellites",value:"<b>$1.2B</b> (June 2025)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["Contract (details classified)","合約（詳情機密）"],pop:["Jun 2025 – TBD","2025年6月–待定"],desc:["<p>10 additional missile warning/tracking satellites.</p><ul><li>Advances the Resilient MWT constellation in MEO.</li><li>Operates with Boeing/Millennium Space MWT sats and L3Harris SDA tracking to create multi-orbit, multi-phenomenology sensor mesh.</li><li>The Epoch 2 award represents significant expansion of Golden Dome's orbital sensor backbone.</li></ul>","<p>10顆額外導彈預警追蹤衛星。</p><ul><li>推進中軌彈性MWT星座。</li><li>與Boeing/Millennium Space和L3Harris SDA追蹤層協同形成多軌道感測器網。</li></ul>"]}],partners:["U.S. Space Force","SDA","Boeing (MWT)"],mkt:"public",rev:["~£26B / ~$33B (FY2025)","~£260億/~$330億（FY2025）"],gdVal:["$1.2B (Epoch 2)","$12億（Epoch 2）"],exp:"low",invNote:["$1.2B Epoch 2 is material for the electronic systems division but modest at the group level (~3.6% of revenue). BAE's primary growth drivers are European defense spending and AUKUS submarine work. Trades on London Stock Exchange (BA.) with OTC ADR (BAESY).","$12億Epoch 2對電子系統部門重要但集團層面溫和（~3.6%營收）。BAE主要增長動力是歐洲國防支出和AUKUS潛艇。在倫敦交易所(BA.)上市，OTC ADR為BAESY。"]},
{name:"Kratos Defense & Security",ticker:"Nasdaq: KTOS",cat:"prime",tags:[{label:["MACH-TB 2.0 (<b>$1.45B</b>)","MACH-TB 2.0(<b>$14.5</b>億)"],color:"amber"},{label:["Hypersonics Leader","高超音速領導者"],color:"red"},{label:["Golden Dome Adjacent","Golden Dome關聯"],color:"purple"}],summary:["<b>$1.45B</b> MACH-TB 2.0 prime (largest KTOS contract); subcontracted RKLB <b>$190M</b>/20 HASTE; Erinyes Mach 5+ for MDA; Prometheus JV with Rafael (Iron Dome manufacturer); microwave electronics in Iron Dome/Patriot/THAAD; 10-K cites Golden Dome.","<b>$14.5</b>億MACH-TB 2.0主承商；分包RKLB <b>$1.9</b>億/20次HASTE；Erinyes超5馬赫為MDA試飛；與Rafael（Iron Dome製造商）Prometheus合資；Iron Dome/愛國者/THAAD微波電子；年報引述Golden Dome。"],role:["Golden Dome-adjacent via multiple vectors. MACH-TB 2.0 prime provides the affordable hypersonic test infrastructure Golden Dome interceptors need. 10-K explicitly cites 'Golden Dome strategic defense system' alignment. Erinyes flew Mach 5+ for MDA HTB-1 (Jun 2024, developed in 3 years for <<b>$15M</b>). Prometheus JV with Rafael USA (Iron Dome/David's Sling manufacturer) for SRMs and warheads. <b>CEO DeMarco</b>: 'step function catalyst.' Microwave electronics embedded in Iron Dome, Arrow, Patriot, THAAD, IBCS, IFPC — virtually every ground system Golden Dome integrates. 55,000 sq ft Princess Anne MD facility near NASA Wallops. Expanding Israel facilities including space-qualified. Subcontracted Rocket Lab <b>$190M</b> for 20 HASTE launches (Mar 18, 2026).","通過多重渠道與Golden Dome關聯。MACH-TB 2.0主承商提供攔截器開發所需的測試基礎設施。年報明確引述Golden Dome。Erinyes 2024年6月以超5馬赫為MDA試飛。與Rafael USA成立Prometheus合資。微波電子元件嵌入所有地面系統。55,000平方英尺Princess Anne工廠。分包RKLB <b>$1.9</b>億/20次HASTE（2026年3月18日）。"],contracts:[{name:"MACH-TB 2.0 Task Area 1 (Prime)",value:"<b>$1.45B</b> (5-yr OTA, Jan 6 2025)",agency:["TRMC / NSWC Crane Division (OUSD R&E)","TRMC/NSWC Crane（研發工程次長辦公室）"],type:["Other Transaction Agreement (OTA)","OTA"],pop:["Jan 2025 – Jan 2030 (5-yr if all options)","2025年1月–2030年1月（5年全選項）"],desc:["<p>Largest KTOS contract ever.</p><ul><li>SEIT including subscale, full-scale, air launch services to increase hypersonic flight test cadence.</li><li>Team: Leidos, Rocket Lab (<b>$190M</b>/20 HASTE, announced Mar 18 2026), Stratolaunch, Koda, Corvid, Northwind, JRC, PAR Systems, CFD Research, UMN, Purdue.</li><li>Erinyes is one hypersonic frontend.</li><li>TRMC Director Rumford: 'essential tool to accelerate science and technology into next-gen hypersonic capabilities.' NOT a direct Golden Dome contract but provides critical test infrastructure. 55,000 sq ft Princess Anne facility established for MACH-TB.</li></ul>","<p>KTOS歷史最大合約。</p><ul><li>團隊：Leidos、Rocket Lab（<b>$1.9億</b>/20次HASTE，2026年3月18日）、Stratolaunch等。</li><li>Erinyes為高超音速前端之一。</li><li>TRMC主任Rumford：「加速科技轉化的關鍵工具。</li><li>」非直接Golden Dome合約但提供關鍵測試基礎設施。</li></ul>"]},{name:"MDA HTB-1 / Erinyes Flight",value:"Undisclosed",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["Contract + Company IR&D","合約+公司內部研發"],pop:["~2021 – Jun 2024 (first flight)","~2021–2024年6月（首飛）"],desc:["<p>Erinyes flew Mach 5+ for MDA's first Hypersonic Testbed mission (Jun 2024).</p><ul><li>Developed in 3 years for <<b>$15M</b>.</li><li>Vehicle cost ~<b>$5M</b> without motor.</li><li>Directly relevant to SBI development — Pentagon needs to dramatically increase flight test frequency for 2028 IOC.</li></ul>","<p>Erinyes 2024年6月以超5馬赫為MDA首次HTB-1任務試飛。</p><ul><li>3年<<b>$1,500萬</b>開發。</li><li>載具不含發動機~<b>$500萬</b>。</li><li>與SBI開發直接相關。</li></ul>"]},{name:"Prometheus JV with Rafael USA",value:"Undisclosed ('step function catalyst' — CEO)",agency:["N/A (commercial JV)","不適用（商業合資）"],type:["Joint Venture Agreement","合資協議"],pop:["2025 – ongoing (ramp to FRP)","2025–進行中（爬坡至全速生產）"],desc:["<p>JV with Rafael (Iron Dome/David's Sling/Iron Beam manufacturer).</p><ul><li>Full-rate SRM and warhead production, <b>'Americanizing'</b> Israeli energetics.</li><li><b>CEO DeMarco</b>: 'tens of thousands of SRMs and warheads for both Israel and U.S. national security demand.' Feeds Golden Dome interceptor supply chain directly.</li></ul>","<p>與Rafael（Iron Dome/David's Sling/Iron Beam製造商）合資。</p><ul><li>量產固體火箭發動機和戰鬥部。</li><li>CEO：「數萬枚為以色列和美國國安需求。</li><li>」直接供應Golden Dome攔截器供應鏈。</li></ul>"]},{name:"Oriole SRM + Microwave Electronics",value:"60 units ordered + multi-program ongoing",agency:["Multiple (MDA, USSF, intl)","多個（MDA、太空軍、國際）"],type:["FFP production orders","FFP生產訂單"],pop:["Ongoing","進行中"],desc:["<p>Oriole: up to 60 SRMs for 'ballistic missile defense-related' missions.</p><ul><li>Microwave electronics embedded in Iron Dome, Iron Sting, Arrow, Patriot, THAAD, IBCS, IFPC — virtually every ground system Golden Dome integrates.</li><li>Expanding Israel manufacturing including space-qualified facility.</li></ul>","<p>Oriole：最多60枚SRM用於「彈道導彈防禦」任務。</p><ul><li>微波電子元件嵌入Iron Dome、Arrow、愛國者、THAAD、IBCS、IFPC——幾乎所有Golden Dome整合的地面系統。</li></ul>"]}],partners:["Rafael USA (Prometheus)","Rocket Lab (<b>$190M</b> HASTE)","Leidos","Stratolaunch"],mkt:"public",rev:["~$1.1B (FY2025)","~$11億（FY2025）"],gdVal:["$1.45B MACH-TB 2.0 (5-yr) + Prometheus + microwave programs","$14.5億MACH-TB 2.0（5年）+ Prometheus + 微波計劃"],exp:"vhigh",invNote:["<b>Second-highest GD purity among public equities after RKLB.</b> MACH-TB 2.0 alone ($1.45B) exceeds annual revenue by ~30%. The Prometheus JV with Rafael adds a long-duration growth catalyst. Microwave electronics embedded across virtually every Golden Dome ground system. Key risk: MACH-TB is OTA (not FFP) — cost overruns could compress margins. 10-K explicitly cites Golden Dome alignment.","<b>上市公司中GD純度僅次於RKLB。</b>MACH-TB 2.0（$14.5億）超過年營收~30%。Prometheus合資增添長期增長催化劑。微波電子元件嵌入幾乎所有Golden Dome地面系統。風險：MACH-TB是OTA（非FFP）——超支可能壓縮利潤。年報明確引述Golden Dome。"]},
{name:"True Anomaly",ticker:"Private (<b>$389M</b> raised)",cat:"startup",tags:[{label:["Space Startup","太空新創"],color:"orange"},{label:["SBI Prototype","太空攔截器原型"],color:"cyan"},{label:["Jackal/Mosaic","Jackal/Mosaic"],color:"purple"}],summary:["SBI prototype awardee; Jackal autonomous orbital vehicle + Mosaic AI space domain awareness; <b>$30M</b> VICTUS HAZE with Firefly; GEO/cislunar missions 2026; SVP Kitay (ex-Pentagon space policy).","太空攔截器原型；Jackal自主軌道載具+Mosaic AI太空態勢感知；<b>$3,000</b>萬VICTUS HAZE；2026年GEO/月球任務；前五角大樓太空政策主管。"],role:["Builds Jackal (autonomous orbital vehicle) and Mosaic (AI space domain awareness OS). Classified OTA for SBI prototypes (Nov 2025). <b>$30M</b> VICTUS HAZE with Firefly. SVP Kitay (ex-Pentagon space policy lead). <b>$389M</b> raised. JD Vance-linked VC. Jackal/Mosaic scheduled for first independent GEO and cislunar missions 2026.","Jackal自主軌道載具和Mosaic AI太空態勢感知OS。獲機密OTA太空攔截器原型合約。<b>$3,000</b>萬VICTUS HAZE。2026年首次GEO和月球軌道獨立任務。"],contracts:[{name:"SBI Prototype — OTA",value:"~<b>$9</b>-10M (classified, Nov 2025)",agency:["U.S. Space Force (SSC)","太空軍（SSC）"],type:["OTA","OTA"],pop:["Nov 2025 – TBD","2025年11月–待定"],desc:["<p>Among 18 firms.</p><ul><li>Jackal provides maneuverable platform potentially adaptable for SBI — autonomous rendezvous and proximity operations capability.</li><li>Company publicly named despite classification.</li><li>Future production contracts worth billions annually.</li></ul>","<p>18家之一。</p><ul><li>Jackal提供可適用於SBI的可機動平台。</li><li>儘管屬機密，公司名稱已公開。</li><li>未來生產合約每年價值數十億。</li></ul>"]},{name:"VICTUS HAZE",value:"<b>$30M</b> (Space Force)",agency:["U.S. Space Force (SpaceWERX)","太空軍（SpaceWERX）"],type:["OTA","OTA"],pop:["2024 – 2026","2024–2026年"],desc:["<p>Tactically responsive space demonstration with Firefly Aerospace.</p><ul><li>Demonstrates rapid orbital maneuver and quick-reaction space operations relevant to Golden Dome responsive orbital engagement requirements.</li></ul>","<p>與Firefly的太空軍戰術響應演示。</p><ul><li>展示Golden Dome所需的快速軌道機動能力。</li></ul>"]}],partners:["Firefly Aerospace","Anduril"],mkt:"private",rev:["Pre-revenue / early-stage ($389M raised)","營收前/早期階段（已融資$3.89億）"],gdVal:["~$40M (SBI OTA + VICTUS HAZE)","~$4,000萬（SBI OTA + VICTUS HAZE）"],exp:"vhigh",invNote:["Private, pre-IPO — not directly investable. Backed by JD Vance-linked VC. Entire business thesis depends on Golden Dome and space defense. Watch for IPO filing or SPAC announcement.","未上市，IPO前——無法直接投資。JD Vance相關VC支持。整體商業論點依賴Golden Dome和太空防禦。"]},
{name:"Apex Space",ticker:"Private (<b>$1B+</b> val.)",cat:"startup",tags:[{label:["Satellite Bus Mfr.","衛星平台製造"],color:"orange"},{label:["Orbital Magazine","軌道彈藥庫"],color:"red"},{label:["Anduril Partner","Anduril合作"],color:"purple"}],summary:["Mass satellite bus manufacturer (200+/yr); 'Orbital Magazine' interceptor host (<b>$6</b>-10M unit); Project Shadow self-funded demo Jun 2026; Anduril partnership; Link-182 pre-integration; two <b>$200M</b> rounds.","量產衛星平台(200+/年)；軌道彈藥庫攔截器載台(<b>$600</b>-1,000萬)；Project Shadow 2026年6月；Anduril合作；Link-182預整合；兩輪各<b>$2</b>億融資。"],role:["Builds interceptor platforms, not interceptors. Aries (~100kg), Nova (~500kg), Comet (~5,000kg). Orbital Magazine: Comet carries up to 6 interceptors. 200+/yr factory capacity. <b>CEO Cinnamon</b>: unit cost <b>$6</b>-10M depending on config. Self-funded <b>$15M</b> Project Shadow (launch NET Jun 2026): Nova bus with software-defined radio transmitting Link-182 (USSF Milnet standard). Pre-integrating into DoD architecture. Anduril partnership for defense payload buses. Two <b>$200M</b> rounds. <b>$1B+</b> valuation.","製造攔截器載台。Comet可搭載6枚攔截器。年產能200+。單價<b>$600</b>-1,000萬。<b>$1,500</b>萬Project Shadow（2026年6月）：Link-182預整合Milnet。與Anduril合作。兩輪各<b>$2</b>億融資。"],contracts:[{name:"Project Shadow (Self-funded Demo)",value:"<b>$15M</b> (NET Jun 2026)",agency:["N/A (company self-funded)","不適用（公司自資）"],type:["Internal investment","內部投資"],pop:["2025 – NET Jun 2026 (launch)","2025–預計2026年6月"],desc:["<p>In-orbit demo of Orbital Magazine — spacecraft storing, thermally controlling, deploying kinetic interceptors. Nova bus with Link-182 (USSF Milnet standard).</p><ul><li><b>CEO Cinnamon</b>: 'We want to mature the tech to make sure it works.</li><li>Then we go to large primes and say we're really good at the Orbital Magazine.' No live interceptors — proving enabling tech.</li><li>Unit cost ~<b>$6</b>-10M.</li><li>Experts estimate thousands of interceptors needed for coverage.</li></ul>","<p>軌道彈藥庫在軌演示。</p><ul><li>Nova平台搭載Link-182（Milnet標準）。</li><li><b>CEO Cinnamon</b>：「我們要確保技術可行，然後告訴大型主承商我們在軌道彈藥庫方面很出色。</li><li>」不搭載實彈。</li><li>專家估計需數千枚攔截器。</li></ul>"]},{name:"Anduril Bus Supply Partnership",value:"Undisclosed",agency:["N/A (commercial partnership)","不適用（商業合作）"],type:["Strategic supply agreement","戰略供應協議"],pop:["2024 – ongoing","2024–進行中"],desc:["<p>Strategic bus supply for Anduril defense payloads.</p><ul><li>Tier-1-to-tier-2 relationship forming ahead of formal Golden Dome production awards.</li><li>Anduril payloads (including SBI components) on Apex mass-manufactured platforms.</li></ul>","<p>為Anduril國防載荷供應衛星平台。</p><ul><li>在正式授標前形成的供應鏈關係。</li></ul>"]}],partners:["Anduril","Link-182/Milnet"],mkt:"private",rev:["Pre-revenue (~$400M raised, $1B+ valuation)","營收前（已融資~$4億，估值$10億+）"],gdVal:["$15M self-funded demo + Anduril partnership (TBD)","$1,500萬自資演示 + Anduril合作（待定）"],exp:"vhigh",invNote:["Private, pre-IPO — not directly investable. Business model is the satellite bus 'arms dealer' for the entire Golden Dome interceptor constellation. If Golden Dome proceeds, Apex could become a multi-billion platform supplier. Project Shadow (Jun 2026) is the key de-risking event.","未上市——無法直接投資。商業模式是Golden Dome攔截器星座的衛星平台「軍火商」。如Golden Dome推進，Apex可能成為數十億平台供應商。Project Shadow（2026年6月）是關鍵去風險事件。"]},
{name:"Booz Allen Hamilton",ticker:"NYSE: BAH",cat:"services",tags:[{label:["Advisory","顧問"],color:"amber"},{label:["Brilliant Swarms","智能蜂群"],color:"pink"},{label:["SHIELD Phase 1","SHIELD第1階段"],color:"emerald"}],summary:["Proposed 'Brilliant Swarms' (1,000-2,000 sats) competing vs SpaceX-Palantir-Anduril; SHIELD Phase 1; systems engineering, digital twin.","「智能蜂群」（1,000-2,000衛星）與SpaceX-Palantir-Anduril競爭；SHIELD第1階段；系統工程、數位孿生。"],role:["Proposed 'Brilliant Swarms' 1,000-2,000 satellite architecture for Golden Dome custody layer. Partners TBD. Competes vs SpaceX-Palantir-Anduril consortium. SHIELD Phase 1 awardee (Dec 2, 2025). Systems engineering, digital twin, simulation.","提出「智能蜂群」1,000-2,000衛星架構。合作夥伴待定。與SpaceX-Palantir-Anduril競爭。SHIELD第1階段授標（2025年12月2日）。"],contracts:[{name:"'Brilliant Swarms' Proposal",value:"TBD (bid stage)",agency:["DoD / Golden Dome Office (bid stage)","國防部（競標階段）"],type:["Proposal (not yet awarded)","提案（尚未授標）"],pop:["TBD","待定"],desc:["<p>Proposed architecture of 1,000–2,000 satellites for Golden Dome's sensing/custody layer — the most ambitious constellation proposal publicly announced. Competes directly against the SpaceX-Palantir-Anduril consortium's 400–1,000 tracking + 200 attack satellite proposal.</p><ul><li>The <b>'Brilliant Swarms'</b> name deliberately echoes the SDI-era <b>'Brilliant Pebbles'</b> concept from the 1980s that Northrop Grumman originally developed.</li><li>Partner companies have not been publicly identified, suggesting either early-stage negotiations or intentional secrecy.</li><li>If selected, this would represent one of the largest satellite constellation procurements in history, potentially exceeding SpaceX's Starlink in total unit count.</li><li>Booz Allen's deep institutional knowledge of DoD acquisition processes and systems engineering experience positions it as an integrator rather than a hardware manufacturer — it would likely orchestrate a consortium of satellite and component manufacturers.</li></ul>","<p>為Golden Dome感知/監測層提出1,000–2,000顆衛星架構——公開宣布中最具雄心的星座提案。直接與SpaceX-Palantir-Anduril聯盟的400–1,000+200顆方案競爭。</p><ul><li>「智能蜂群」名稱刻意呼應1980年代SDI「Brilliant Pebbles」概念。</li><li>合作夥伴未公開。</li><li>如獲選將是有史以來最大的衛星星座採購之一。</li><li>Booz Allen作為整合商而非硬體製造商定位。</li></ul>"]},{name:"SHIELD IDIQ (Phase 1)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>First-tranche awardee (Dec 2, 2025) — among the initial 1,014 companies selected from 2,463 offers.</p><ul><li>Positioned for systems engineering, digital twin environments, simulation, and modeling task orders.</li><li>Booz Allen's deep institutional knowledge of DoD acquisition processes — spanning decades of advisory work across every military service and defense agency — makes it particularly valuable for the enormously complex integration challenges Golden Dome presents.</li><li>Gen.</li><li>Guetlein has described Golden Dome as a 'monster systems engineering problem,' which plays directly to Booz Allen's core competencies in large-scale defense system architecture and integration.</li></ul>","<p>第一批授標（2025年12月2日）——從2,463份投標中選出的1,014家公司之一。</p><ul><li>定位於系統工程、數位孿生、模擬和建模任務訂單。</li><li>Booz Allen對國防部採購流程的深厚制度知識——跨越數十年軍事諮詢——使其在Golden Dome呈現的巨大複雜整合挑戰中特別有價值。</li><li>Guetlein將軍描述Golden Dome為「巨型系統工程問題」，直接契合Booz Allen的核心能力。</li></ul>"]}],partners:["TBD"],mkt:"public",rev:["~$10B (FY2026)","~$100億（FY2026）"],gdVal:["IDIQ qualification only — no funded Task Orders yet","僅IDIQ資格——尚無已資助任務訂單"],exp:"low",invNote:["<b>⚠ IDIQ 'hunting license' only.</b> The Brilliant Swarms proposal is ambitious but unawarded. Zero funded Golden Dome backlog as of March 2026. BAH is a diversified consulting firm — GD would be upside, not base case. Monitor for Task Order wins before assigning GD premium to valuation.","<b>⚠ 僅IDIQ「狩獵許可證」。</b>智能蜂群提案宏大但未授標。截至2026年3月零已資助GD積壓。BAH是多元化顧問公司——GD為上行而非基本情境。在確認任務訂單前不宜賦予GD估值溢價。"]},
{name:"Viasat",ticker:"Nasdaq: VSAT",cat:"satellite",tags:[{label:["Secure Comms","安全通訊"],color:"emerald"},{label:["SHIELD Phase 1","SHIELD第1階段"],color:"blue"}],summary:["SHIELD Phase 1; protected waveforms, resilient satcom transport, network-of-networks modeling, C2 interface simulation.","SHIELD第1階段；保護波形、彈性衛星通訊、網絡建模、C2介面模擬。"],role:["Protected waveforms, resilient satcom transport, C2 interface simulation. Critical for Golden Dome data distribution ensuring sensor data reaches interceptors securely with sufficient bandwidth.","保護波形、彈性衛星通訊、C2介面模擬。確保感測器數據安全到達攔截器。"],contracts:[{name:"SHIELD IDIQ (Phase 1)",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Early-confirmed Phase 1 awardee (Dec 2, 2025).</p><ul><li>Viasat's expertise in protected waveforms, resilient satellite communications transport layers, and network-of-networks modeling makes it a natural fit for Golden Dome's data distribution challenge — ensuring that weapons-quality targeting data from orbital sensors (AMTI, SDA tracking layer, Starshield, MWT) reaches ground interceptors, battle management nodes, and fighter crews securely and with sufficient bandwidth in contested electromagnetic environments.</li><li>C2 interface simulation and verification capability is particularly relevant as Golden Dome integrates multiple constellation architectures (AMTI ~600 sats, PWSA tracking/transport layers, Milnet, MWT MEO) into a unified data fabric that must function under peer adversary EW jamming conditions.</li></ul>","<p>早期Phase 1授標者（2025年12月2日）。</p><ul><li>Viasat在保護波形、彈性衛星通訊傳輸層和網絡建模方面的專業使其適合Golden Dome的數據分配挑戰——確保來自軌道感測器（AMTI、SDA追蹤層、Starshield、MWT）的武器級瞄準數據在受電磁對抗的環境中安全且足夠帶寬地到達地面攔截器、戰鬥管理節點和飛行員。</li><li>C2介面模擬能力在Golden Dome整合多個星座架構（AMTI~600顆、PWSA追蹤/傳輸層、Milnet、MWT中軌）為統一數據結構時尤為關鍵——該結構必須在對等對手電子戰干擾條件下運作。</li></ul>"]}],partners:["MDA","USSF"],mkt:"public",rev:["~$4B (FY2025)","~$40億（FY2025）"],gdVal:["IDIQ qualification only — no funded Task Orders yet","僅IDIQ資格——尚無已資助任務訂單"],exp:"low",invNote:["<b>⚠ IDIQ qualification only.</b> Well-positioned for secure comms task orders but zero funded GD backlog currently. Viasat's primary growth driver remains commercial broadband and government satcom, not Golden Dome.","<b>⚠ 僅IDIQ資格。</b>在安全通訊任務訂單方面有競爭力但目前零GD已資助積壓。Viasat主要增長動力仍是商用寬頻和政府衛星通訊。"]},
{name:"Elbit America (Elbit Systems)",ticker:"Nasdaq: ESLT",cat:"prime",tags:[{label:["Israeli Defense","以色列國防"],color:"blue"},{label:["Iron Dome Expertise","Iron Dome專業"],color:"red"},{label:["SHIELD","SHIELD"],color:"emerald"}],summary:["U.S. arm of Elbit Systems — Iron Dome contractor; bridging Israeli missile defense operational experience (thousands of real-world intercepts) into Golden Dome.","Elbit Systems美國分部——Iron Dome承包商；將以色列數千次實戰攔截經驗引入Golden Dome。"],role:["U.S. subsidiary of Israel's Elbit Systems, key Iron Dome contractor. Bridges decades of Israeli missile defense technology and thousands of real-world intercept engagements into Golden Dome.","以色列Elbit Systems美國子公司。將數十年以色列導彈防禦技術和數千次實戰攔截經驗引入Golden Dome。"],contracts:[{name:"SHIELD IDIQ Awardee",value:"Up to <b>$151B</b> pool",agency:["Missile Defense Agency (MDA)","導彈防禦局（MDA）"],type:["IDIQ ($151B shared ceiling / 2,440 vendors; no guaranteed funding — revenue at task-order level only)","IDIQ（$1,510億共享上限/2,440家；基礎合約無保證資金——僅任務訂單層級有收入）"],pop:["Dec 2025 – Dec 2035 (if all options)","2025年12月–2035年12月（全選項行使）"],desc:["<p>Iron Dome operational data from thousands of real-world engagements provides unique differentiation directly applicable to Golden Dome's multi-layer architecture.</p><ul><li>Intercept algorithms refined through thousands of actual rocket, missile, and drone engagements since Iron Dome became operational in 2011.</li><li>Sensor fusion techniques proven in the most demanding operational environment — simultaneous multi-threat salvos from Hamas, Hezbollah, and Iranian forces.</li><li>Rapid engagement decision logic enabling sub-second shoot/no-shoot determinations, critical for Golden Dome's automated battle management layer.</li><li>Elbit's EW, C4ISR, and UAV capabilities provide additional touchpoints across Golden Dome's ground and airborne sensing layers.</li></ul>","<p>Iron Dome數千次實戰攔截數據為Golden Dome的多層架構提供獨特且直接適用的優勢。</p><ul><li>自2011年Iron Dome投入運營以來，攔截算法經過數千次實際火箭、導彈和無人機交戰的精煉。</li><li>感測器融合技術在最嚴苛的作戰環境中得到驗證——哈馬斯、真主黨和伊朗同時多重威脅齊射。</li><li>快速交戰決策邏輯實現亞秒級射擊/不射擊判斷，對Golden Dome自動化戰鬥管理層至關重要。</li><li>Elbit的電子戰、C4ISR和無人機能力為Golden Dome的地面和空中感知層提供額外觸點。</li></ul>"]}],partners:["Iron Dome","Rafael"],mkt:"public",rev:["~$6.3B (parent Elbit Systems, FY2025)","~$63億（母公司Elbit Systems，FY2025）"],gdVal:["IDIQ qualification only","僅IDIQ資格"],exp:"low",invNote:["Parent Elbit Systems trades on Nasdaq (ESLT) and TASE. Iron Dome expertise is a unique differentiator but no funded GD contracts yet. Elbit's growth is driven by broad Israeli/international defense demand rather than Golden Dome specifically.","母公司在Nasdaq（ESLT）和特拉維夫交易所上市。Iron Dome專業是獨特優勢但尚無GD已資助合約。Elbit增長主要由以色列/國際國防需求驅動。"]},
